function canBuyEffect(effect) {
  if (state.ownedEffects.includes(effect.id)) return false;
  if (state.level < effect.unlockLevel) return false;
  if (state.upgrades.rocketSize < effect.minRocketSize) return false;
  if (effect.requiresMaxRocket && state.upgrades.rocketSize < MAX_ROCKET_SIZE) return false;
  return state.coins >= effect.cost;
}

function canBuyTrail(trail) {
  if (state.ownedTrails.includes(trail.id)) return false;
  if (state.level < trail.unlockLevel) return false;
  if (state.upgrades.trailLength < trail.minTrailLength) return false;
  return state.coins >= trail.cost;
}

function canBuyAnything() {
  for (const item of upgradeItems) {
    const lvl = state.upgrades[item.key];
    if (state.level >= item.unlockLevel && lvl < item.max && state.coins >= item.base * lvl) return true;
  }
  for (const e of explosionEffects) if (canBuyEffect(e)) return true;
  for (const t of rocketTrails) if (canBuyTrail(t)) return true;
  return false;
}

function explosionPreviewHtml(effect) {
  if (state.liteMode) {
    const lite = liteExplosionStyle(effect);
    return `
      <div class="preview">
        <div class="lite-preview-blast"
          style="
            --lite-ring:${Math.max(74, blastRadius() * 1.35)}px;
            --lite-dur:${((effect.life + lite.lifeBonus) / 1000).toFixed(2)}s;
            --lite-border:${lite.border};
            --lite-shadow:${lite.shadow};
          ">
        </div>
      </div>
    `;
  }

  if (effect.radiusOnly) {
    return `
      <div class="preview">
        <div class="preview-explosion" style="--ring:${70 + state.upgrades.rocketSize * 12}px; --dur:${(effect.life / 1000).toFixed(2)}s;">
        </div>
      </div>
    `;
  }

  const simulatedParticles = Math.floor(effect.particles + state.upgrades.rocketSize * 4);
  const count = Math.min(simulatedParticles, effect.id === "ultimate" ? 64 : 44);
  const dur = (effect.life / 1000).toFixed(2) + "s";
  const actualDistance = 32 + effect.distanceBonus + state.upgrades.rocketSize * 8;
  const spans = [];

  for (let i = 0; i < count; i++) {
    spans.push(`
      <span style="
        --c:${effect.colors[i % effect.colors.length]};
        --angle:${(360 / count) * i}deg;
        --distance:${actualDistance * .55 + (i % 7) * 3}px;
        --s:${4 + (i % 6)}px;
        --delay:${(i % 9) * .035}s;
        --dur:${dur};
        --twist:${effect.id === "spiral" || effect.id === "ultimate" ? 160 : 0}deg;
      "></span>
    `);
  }

  return `
    <div class="preview">
      <div class="preview-explosion" style="--ring:${blastRadius() * 1.35}px; --dur:${dur};">
        ${spans.join("")}
      </div>
    </div>
  `;
}

function trailPreviewHtml(trail) {
  if (state.liteMode) {
    const lite = liteTrailStyle(trail);
    return `
      <div class="preview">
        <div class="preview-trail">
          <div class="lite-preview-line"
            style="
              --lite-line-w:${lite.w}px;
              --lite-line-h:${lite.h}px;
              --lite-line-bg:${lite.bg};
              --lite-line-shadow:${lite.shadow};
            ">
          </div>
          <div class="preview-rocket"><span>🚀</span></div>
        </div>
      </div>
    `;
  }

  const pieces = [];
  const isBasic = trail.id === "tiny";
  const count = isBasic ? 10 : 12 + trail.density * 4;
  const fadeScale = Math.max(1, Math.min(state.upgrades.trailLength, trail.minTrailLength || 1));
  const baseBehind = isBasic ? 18 : 30;

  for (let i = 0; i < count; i++) {
    const behind = baseBehind + i * (isBasic ? 4.5 : 5.5 + trail.streaks) * (0.72 + fadeScale * 0.13);
    pieces.push(`
      <span class="preview-dot ${!isBasic && i % 5 === 0 ? "big" : ""}" style="
        --c:${trail.colors[i % trail.colors.length]};
        --delay:${(i % 10) * .045}s;
        --dot:${Math.max(2.4, trail.particleSize + (!isBasic && i % 5 === 0 ? 2 : 0))}px;
        --behind:${behind}px;
        --top:${44 + Math.sin(i * 1.65) * trail.spread * .35}px;
        --maxOpacity:${isBasic ? .72 : .95};
      "></span>
    `);
  }

  if (!isBasic) {
    for (let i = 0; i < trail.streaks; i++) {
      pieces.push(`
        <span class="preview-streak" style="
          --c:${trail.colors[(i + 1) % trail.colors.length]};
          --delay:${(i * .09).toFixed(2)}s;
          --behind:${54 + i * 28}px;
          --top:${42 + i * 5}px;
          --w:${30 + i * 13}px;
          --h:${3 + i}px;
          --maxOpacity:.85;
        "></span>
      `);
    }
  }

  return `
    <div class="preview">
      <div class="preview-trail">
        ${pieces.join("")}
        <div class="preview-rocket"><span>🚀</span></div>
      </div>
    </div>
  `;
}



function currentShopScroll() {
  const card = overlay.querySelector(".shop-card");
  return card ? card.scrollTop : 0;
}
function restoreShopScroll(scrollTop) {
  requestAnimationFrame(() => {
    const card = overlay.querySelector(".shop-card");
    if (card && Number.isFinite(scrollTop)) card.scrollTop = scrollTop;
  });
}

function openShop(fromLevelEnd = false, scrollTop = 0) {
  if (state.running) {
    checkCompletionFailsafe(0, true);
    if (state.nextReady && !fromLevelEnd) {
      showLevelComplete();
      return;
    }
    state.paused = true;
  }

  const upgradeHtml = upgradeItems.map(item => {
    const lvl = state.upgrades[item.key];
    const cost = item.base * lvl;
    const maxed = lvl >= item.max;
    const levelOk = state.level >= item.unlockLevel;
    const canBuy = levelOk && !maxed && state.coins >= cost;
    const costText = formatExactNumber(cost);
    const status = maxed ? "Maxed" : !levelOk ? "Unlocks at level " + item.unlockLevel : canBuy ? "Available" : "Need " + costText + " credits";

    return `
      <div class="shop-item ${canBuy ? "" : "locked"}">
        <div>
          <strong>${item.name}</strong>
          <div>${item.desc}</div>
          <small>Level ${lvl}/${item.max} · ${status}${!maxed && levelOk ? " · Cost " + costText : ""}</small>
        </div>
        <button ${canBuy ? "" : "disabled"} onclick="buyUpgrade('${item.key}', ${fromLevelEnd})">
          ${maxed ? "Maxed" : !levelOk ? "Locked" : canBuy ? "Buy" : "Need " + costText}
        </button>
      </div>
    `;
  }).join("");

  const effectsHtml = explosionEffects.map(effect => {
    const owned = state.ownedEffects.includes(effect.id);
    const selected = state.selectedEffect === effect.id;
    const levelOk = state.level >= effect.unlockLevel;
    const sizeOk = state.upgrades.rocketSize >= effect.minRocketSize;
    const maxOk = !effect.requiresMaxRocket || state.upgrades.rocketSize >= MAX_ROCKET_SIZE;
    const canBuy = canBuyEffect(effect);
    let status = owned ? "Purchased" : !levelOk ? "Locked by level" : !sizeOk ? "Needs Rocket Size " + effect.minRocketSize : !maxOk ? "Needs max Rocket Size" : state.coins < effect.cost ? "Need " + formatExactNumber(effect.cost) + " credits" : "Unlocked";

    return `
      <div class="shop-item ${selected ? "selected" : ""} ${owned || canBuy ? "" : "locked"}">
        <div>
          <strong>${effect.name}</strong>
          <div>${effect.description}</div>
          <small>${owned ? "Ready to equip" : `${status} · Unlock level ${effect.unlockLevel} · Rocket Size ${effect.minRocketSize}+ · Cost ${formatExactNumber(effect.cost)}`}</small>
          ${explosionPreviewHtml(effect)}
        </div>
        <button ${owned || canBuy ? "" : "disabled"} onclick="${owned ? `selectEffect('${effect.id}', ${fromLevelEnd})` : `buyEffect('${effect.id}', ${fromLevelEnd})`}">
          ${selected ? "Using" : owned ? "Use" : canBuy ? "Buy" : status}
        </button>
      </div>
    `;
  }).join("");

  const trailsHtml = rocketTrails.map(trail => {
    const owned = state.ownedTrails.includes(trail.id);
    const selected = state.selectedTrail === trail.id;
    const levelOk = state.level >= trail.unlockLevel;
    const lengthOk = state.upgrades.trailLength >= trail.minTrailLength;
    const canBuy = canBuyTrail(trail);
    let status = owned ? "Purchased" : !levelOk ? "Unlocks at level " + trail.unlockLevel : !lengthOk ? "Needs Trail Length " + trail.minTrailLength : state.coins < trail.cost ? "Need " + formatExactNumber(trail.cost) + " credits" : "Unlocked";

    return `
      <div class="shop-item ${selected ? "selected" : ""} ${owned || canBuy ? "" : "locked"}">
        <div>
          <strong>${trail.name}</strong>
          <div>${trail.description}</div>
          <small>${owned ? "Ready to equip" : `${status} · Unlock level ${trail.unlockLevel} · Trail Length ${trail.minTrailLength}+ · Cost ${formatExactNumber(trail.cost)}`}</small>
          ${trailPreviewHtml(trail)}
        </div>
        <button ${owned || canBuy ? "" : "disabled"} onclick="${owned ? `selectTrail('${trail.id}', ${fromLevelEnd})` : `buyTrail('${trail.id}', ${fromLevelEnd})`}">
          ${selected ? "Using" : owned ? "Use" : canBuy ? "Buy" : status}
        </button>
      </div>
    `;
  }).join("");

  overlay.style.background = "rgba(0,0,0,.58)";
  overlay.style.display = "grid";
  overlay.innerHTML = `
    <div class="card shop-card">
      <div class="shop-bar">
        <h1>Rocket Workshop</h1>
        <div class="shop-credit">🪙 ${formatExactNumber(state.coins)} Credits</div>
        <div class="button-row">
          ${fromLevelEnd ? `<button onclick="advanceAfterLevel()">Next Level</button>` : ""}
          <button onclick="closeShop()">${state.running ? "Back" : "Back"}</button>
        </div>
      </div>

      <div class="lite-mode-shop-control">
        <span><strong>Lite Mode:</strong> ${state.liteMode ? "ON" : "OFF"}<br><small>Simple circles and lines for low-spec devices.</small></span>
        <button onclick="toggleLiteModeFromShop(${fromLevelEnd ? "true" : "false"})">${state.liteMode ? "Turn Off" : "Turn On"}</button>
      </div>

      <h2>Upgrades</h2>
      <div class="shop-grid">${upgradeHtml}</div>

      <h2>Explosion Effects</h2>
      <p>You start with no explosion effect. Every effect has a Rocket Size requirement.</p>
      <div class="shop-grid">${effectsHtml}</div>

      <h2>Rocket Trails</h2>
      <p>Trail previews fly from right to left. Particles come from the rear booster. Advanced trails require higher Trail Length.</p>
      <div class="shop-grid">${trailsHtml}</div>

    </div>
  `;
  restoreShopScroll(scrollTop);
}

function congratulateMaxUpgrade(name) {
  overlay.style.background = "rgba(0,0,0,.58)";
  overlay.style.display = "grid";
  overlay.innerHTML = `
    <div class="card">
      <h1>🎉 Max Power!</h1>

  `;

window.buyUpgrade = function(key, fromLevelEnd = false) {
  const item = upgradeItems.find(i => i.key === key);
  const lvl = state.upgrades[key];
  const cost = item.base * lvl;
  if (lvl >= item.max) return;
  if (state.level < item.unlockLevel) return showMessage(item.name + " unlocks at level " + item.unlockLevel);
  if (state.coins < cost) return showMessage("Not enough credits!");
  state.coins -= cost;
  state.upgrades[key]++;
  updateUI();
  if (state.upgrades[key] >= item.max) {
    congratulateMaxUpgrade(item.name);
    return;
  }
  openShop(fromLevelEnd, currentShopScroll());
};

window.buyEffect = function(id, fromLevelEnd = false) {
  const effect = explosionEffects.find(e => e.id === id);
  if (!canBuyEffect(effect)) return showMessage("Requirement not met.");
  state.coins -= effect.cost;
  state.ownedEffects.push(id);
  state.selectedEffect = id;
  updateUI();
  if (state.ownedEffects.length >= explosionEffects.length) {
    congratulateMaxUpgrade("Explosion Effects");
    return;
  }
  openShop(fromLevelEnd, currentShopScroll());
};

window.selectEffect = function(id, fromLevelEnd = false) {
  if (!state.ownedEffects.includes(id)) return;
  state.selectedEffect = id;
  saveCheckpoint("select-effect");
  openShop(fromLevelEnd, currentShopScroll());
};

window.buyTrail = function(id, fromLevelEnd = false) {
  const trail = rocketTrails.find(t => t.id === id);
  if (!trail) return;
  if (state.level < trail.unlockLevel) return showMessage("Locked until level " + trail.unlockLevel);
  if (state.upgrades.trailLength < trail.minTrailLength) return showMessage("Upgrade Trail Length to " + trail.minTrailLength + " first!");
  if (state.coins < trail.cost) return showMessage("Not enough credits!");
  state.coins -= trail.cost;
  state.ownedTrails.push(id);

function resetActiveTimer() {
  state.activeTimerLast = performance.now();
}

function accumulateActiveTime(now = performance.now()) {
  if (!state.running || state.paused || overlay.style.display !== "none") {
    state.activeTimerLast = now;
    return;
  }

  if (!state.activeTimerLast) state.activeTimerLast = now;
  const delta = Math.max(0, Math.min(250, now - state.activeTimerLast));
  state.activePlayMs += delta;
  state.activeTimerLast = now;
}

function formatRunTime(ms) {
  const totalSeconds = Math.max(0, Math.floor(ms / 1000));
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  if (hours > 0) {
    return `${hours}h ${String(minutes).padStart(2, "0")}m`;
  }

  return `${minutes}m ${String(seconds).padStart(2, "0")}s`;
}

function formatShareDate(date = new Date()) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let h = date.getHours();
  const m = String(date.getMinutes()).padStart(2, "0");
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()} ${h}:${m} ${ap}`;
}

function scoreRank(score, hardMode) {
  /*
    Rank rewards clean play.
    Missed meteors/meat-eors and missed UFOs reduce the ranking score,
    so a real pro who misses nothing can reach the highest ranks sooner.
  */
  const modeBonus = hardMode ? 1.18 : 1;
  const missPenalty = Math.max(0.35, 1 - (state.missedTargets || 0) * 0.035 - (state.missedUfos || 0) * 0.08);
  const restorePenalty = Math.max(0.5, 1 - (state.saveContinueCount || 0) * 0.012 - (state.dangerContinueCount || 0) * 0.075);
  const adjusted = score * modeBonus * missPenalty * restorePenalty;

  if (adjusted >= 90000 && (state.missedTargets || 0) === 0 && (state.missedUfos || 0) === 0 && (state.dangerContinueCount || 0) === 0) return "S+";
  if (adjusted >= 60000 && (state.missedTargets || 0) <= 1 && (state.missedUfos || 0) === 0 && (state.dangerContinueCount || 0) <= 1) return "S";
  if (adjusted >= 35000) return "A";
  if (adjusted >= 18000) return "B";
  if (adjusted >= 8000) return "C";
  return "D";
}

let gameOverFireworks = { running: false, raf: null, ctx: null, canvas: null, fireworks: [], particles: [], last: 0, launchTimer: 0 };

function startGameOverFireworks() {
  const canvas = document.getElementById("gameOverCanvas");
  const ctx = canvas.getContext("2d");
  gameOverFireworks = { running: true, raf: null, ctx, canvas, fireworks: [], particles: [], last: performance.now(), launchTimer: 0 };
  resizeGameOverCanvas();
  canvas.style.display = "block";
  for (let i = 0; i < 6; i++) setTimeout(() => launchGameOverFirework(true), i * 180);
  gameOverFireworks.raf = requestAnimationFrame(gameOverFireworksLoop);
}

function stopGameOverFireworks() {
  if (gameOverFireworks.raf) cancelAnimationFrame(gameOverFireworks.raf);
  gameOverFireworks.running = false;
  const canvas = document.getElementById("gameOverCanvas");
  if (canvas) {
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = "none";
  }
}

function resizeGameOverCanvas() {
  const canvas = document.getElementById("gameOverCanvas");
  if (!canvas) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(viewportWidth() * dpr);
  canvas.height = Math.floor(viewportHeight() * dpr);
  canvas.style.width = viewportWidth() + "px";
  canvas.style.height = viewportHeight() + "px";
  canvas.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
}

function randomFireworkColor() {
  return ["#ffffff", "#fff06a", "#ffb23a", "#ff5438", "#35d4ff", "#84ff8c", "#2cffc7", "#ff8a30"][Math.floor(Math.random() * 8)];
}

function launchGameOverFirework(instant = false) {
  const w = viewportWidth(), h = viewportHeight();
  const targetX = 60 + Math.random() * Math.max(100, w - 120);
  const targetY = 60 + Math.random() * Math.max(120, h * 0.48);
  const startX = w * (0.2 + Math.random() * 0.6);
  const startY = h + 20;
  gameOverFireworks.fireworks.push({ x: startX, y: startY, px: startX, py: startY, tx: targetX, ty: targetY, speed: instant ? 760 : 560 + Math.random() * 180, color: randomFireworkColor(), type: Math.floor(Math.random() * 5) });
}

function burstGameOverFirework(x, y, color, type) {
  const count = [70, 95, 120, 150, 190][type] || 100;
  const rings = type >= 3 ? 2 : 1;
  for (let ring = 0; ring < rings; ring++) {
    for (let i = 0; i < count; i++) {
      const angle = Math.PI * 2 * i / count + ring * .08;
      const speed = (type === 4 ? 90 : 55) + Math.random() * (type === 4 ? 230 : 150) + ring * 45;
      const chosen = type === 0 ? "#ffffff" : i % 4 === 0 ? randomFireworkColor() : color;
      const spiral = type === 2 || type === 4;
      gameOverFireworks.particles.push({
        x, y, px: x, py: y,
        vx: Math.cos(angle) * speed + (spiral ? -Math.sin(angle) * 35 : 0),
        vy: Math.sin(angle) * speed + (spiral ? Math.cos(angle) * 35 : 0),
        life: 1.25 + Math.random() * (type === 4 ? 1.55 : .9),
        maxLife: 1.25 + Math.random() * 1.25,
        color: chosen,
        size: 1.2 + Math.random() * (type === 4 ? 3.8 : 2.4),
        gravity: 60 + Math.random() * 55,
        drag: .985 - Math.random() * .012
      });
    }
  }
}

function gameOverFireworksLoop(now) {
  if (!gameOverFireworks.running) return;
  const fw = gameOverFireworks;
  const ctx = fw.ctx;
  const dt = Math.min((now - fw.last) / 1000, .033);
  fw.last = now;

  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "rgba(0,5,9,.18)";
  ctx.fillRect(0, 0, viewportWidth(), viewportHeight());

  fw.launchTimer += dt;
  if (fw.launchTimer > .38) {
    fw.launchTimer = 0;
    launchGameOverFirework();
    if (Math.random() < .35) setTimeout(() => launchGameOverFirework(), 100);
  }

  ctx.globalCompositeOperation = "lighter";

  fw.fireworks = fw.fireworks.filter(f => {
    f.px = f.x; f.py = f.y;
    const dx = f.tx - f.x, dy = f.ty - f.y;
    const dist = Math.hypot(dx, dy) || 1;
    const step = f.speed * dt;
    f.x += dx / dist * step; f.y += dy / dist * step;
    ctx.strokeStyle = f.color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(f.px, f.py); ctx.lineTo(f.x, f.y); ctx.stroke();
    if (dist < 14) { burstGameOverFirework(f.tx, f.ty, f.color, f.type); return false; }
    return true;
  });

  fw.particles = fw.particles.filter(p => {
    p.px = p.x; p.py = p.y;
    p.vx *= p.drag; p.vy = p.vy * p.drag + p.gravity * dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = p.color; ctx.lineWidth = p.size;
    ctx.beginPath(); ctx.moveTo(p.px, p.py); ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.globalAlpha = alpha * .85;
    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * .7, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  fw.raf = requestAnimationFrame(gameOverFireworksLoop);
}

function viewportWidth() {

function shouldPauseForViewportChange() {
  if (!state.running || state.gameOverShown) return false;
  if (restoreLevelCompleteIfNeeded()) return false;

  if (restoreLevelCompleteIfNeeded()) return;

  overlay.style.display = "none";

  setPauseButtonNormal();
  state.lastTime = performance.now();
  state.ignoreViewportPauseUntil = performance.now() + 900;
  resetActiveTimer();

  if (state.running && !state.nextReady && state.spawned === 0 && state.objects.length === 0) {
    state.spawnTimer = Math.max(state.spawnTimer, spawnInterval());
  }
};

function loop(now) {
  if (!state.running) return;

  const dt = Math.min((now - state.lastTime) / 1000, .033);
  state.lastTime = now;
  accumulateActiveTime(now);
  periodicAutoSave(now);

  if (!state.paused) {
    state.spawnTimer += dt * 1000;
    state.levelElapsed += dt;

    if (state.spawned < maxObjectsToSpawn() && state.spawnTimer >= spawnInterval()) {
      state.spawnTimer = 0;
      spawnObject();
    }

    maybeSpawnUfo();
    updateObjects(dt);
    updateUfos(dt);
    updateUfoDrops(dt);
    updateRockets(dt);
    checkCompletionFailsafe(dt);
  } else {
    /*
      Paused usually freezes gameplay, but the UFO reward cinematic must keep running:
      shield breaks -> pause -> special rocket flies -> meat fireworks -> reward prompt.
    */
    updateRockets(dt, true);
  }

  requestAnimationFrame(loop);
}


function handleTouchMultiTap(e) {
  if (overlay.style.display && overlay.style.display !== "none") return;
  if (!state.running || state.paused) return;
  for (const touch of e.changedTouches) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) continue;

    const falling = el.closest(".falling");
    const ufoEl = el.closest(".ufo");

    updatePointer(touch.clientX, touch.clientY);

    if (falling) {
      const obj = state.objects.find(o => o.el === falling);
      if (obj) {
        if (obj.type === "bomb") triggerBombGameOver();
        else lockTarget(obj);
      }
    } else if (ufoEl) {
      const ufo = state.ufos.find(u => u.el === ufoEl);
      if (ufo) tapUfo(ufo);
    } else if (!window.PointerEvent) {
      createMissCrosshair(touch.clientX, touch.clientY);
    }
  }
}


game.addEventListener("pointermove", e => updatePointer(e.clientX, e.clientY));
game.addEventListener("pointerdown", e => {
  if (overlay.style.display !== "none") return;
  updatePointer(e.clientX, e.clientY);

  if (!state.running || state.paused) return;
  if (e.target.closest("#hud, button, input, .ufo, .falling:not(.ufo-drop)")) return;
  createMissCrosshair(e.clientX, e.clientY);
});

  if (state.nextReady) { showLevelComplete(); return; }

  if (state.paused) {
    overlay.style.display = "none";
    state.paused = false;
    setPauseButtonNormal();
    showMessage("Resumed");
    state.lastTime = performance.now();
  resetActiveTimer();
  } else {
    showPauseLegend();
  }
});

ui.nextBtn.addEventListener("click", () => {});

let resizeTimer;

function handleViewportChange(pauseActiveGame = false, delay = 140) {
  clearTimeout(resizeTimer);
  updateViewportSizeVars();
  resizeTimer = setTimeout(() => {
    refreshViewportLayout();
    if (restoreLevelCompleteIfNeeded()) return;
    state.lastTime = performance.now();
    resetActiveTimer();
    if (pauseActiveGame && state.running && shouldPauseForViewportChange()) pauseForRotation();
  }, delay);
}

window.addEventListener("orientationchange", () => handleViewportChange(true, 260));
window.addEventListener("resize", () => handleViewportChange(false, 120));
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", () => handleViewportChange(false, 90));
  window.visualViewport.addEventListener("scroll", () => handleViewportChange(false, 90));
}

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    pauseForInterruption("Game Paused", "The screen was hidden, locked, or switched away. Gameplay is paused so you do not lose by accident.");
  } else {
    handleViewportChange(false, 90);
  }
});

window.addEventListener("blur", () => {
  pauseForInterruption("Game Paused", "The browser lost focus. Gameplay is paused so you do not lose by accident.");
});

window.addEventListener("pagehide", () => {
  pauseForInterruption("Game Paused", "The page was hidden. Gameplay is paused so you do not lose by accident.");
});

window.addEventListener("beforeunload", () => {
  saveCheckpoint("beforeunload");
});

window.startGame = startGame;
window.openShop = openShop;

updateViewportSizeVars();
initStarfield();
resizeGameOverCanvas();
updateUI();
renderTitleScreen();
</script>
</body>
</html>
