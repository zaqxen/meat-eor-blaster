<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Meat-eor Blaster</title>
<style>
:root {
  --panel: rgba(5,17,22,.95);
  --panel2: rgba(255,255,255,.065);
  --text: #f5f7e8;
  --muted: #bed2c4;
  --gold: #ffb23a;
  --blue: #35d4ff;
  --green: #84ff8c;
  --red: #ff5438;
  --ground: 70px;
  --app-height: 100dvh;
  --app-width: 100vw;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}

* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;}

html,
body {
  width: 100%;
  height: var(--app-height, 100dvh);
  min-height: 0;
  margin: 0;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  background: radial-gradient(circle at top, #173f46, #061017 48%, #020507);
  color: var(--text);
  font-family: system-ui, Arial, sans-serif;
}

#game {
  position: relative;
  width: var(--app-width, 100vw);
  height: var(--app-height, 100dvh);
  min-height: 0;
  max-height: var(--app-height, 100dvh);
  overflow: hidden;
  touch-action: none;
}

#starfield {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow: hidden;
  pointer-events: none;
}

.star {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: var(--s);
  height: var(--s);
  border-radius: 50%;
  background: rgba(255,255,255,var(--o));
  box-shadow: 0 0 var(--glow) rgba(255,255,255,var(--o));
  animation: starDrift var(--speed) linear infinite, starTwinkle var(--twinkle) ease-in-out infinite alternate;
  animation-delay: var(--delay);
}

.star.warm {
  background: rgba(255,225,145,var(--o));
  box-shadow: 0 0 var(--glow) rgba(255,215,120,var(--o));
}

.star.cool {
  background: rgba(145,225,255,var(--o));
  box-shadow: 0 0 var(--glow) rgba(85,210,255,var(--o));
}

@keyframes starDrift {
  from { transform: translate3d(0,-14vh,0); }
  to { transform: translate3d(var(--dx),116vh,0); }
}

@keyframes starTwinkle {
  from { opacity: calc(var(--o) * .35); }
  to { opacity: var(--o); }
}

#hud {
  position: absolute;
  top: max(8px, env(safe-area-inset-top));
  left: 8px;
  right: 8px;
  z-index: 30;
  display: flex;
  justify-content: space-between;
  gap: 8px;
  pointer-events: none;
}

.stat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.pill, button {
  background: rgba(4,15,18,.88);
  border: 1px solid rgba(255,178,58,.42);
  color: var(--text);
  border-radius: 999px;
  padding: 7px 10px;
  font-weight: 800;
  box-shadow: 0 0 16px rgba(255,178,58,.08);
}

button {
  pointer-events: auto;
  cursor: pointer;
}

button:disabled {
  opacity: .42;
  cursor: not-allowed;
}

.hud-icon { display: inline-block; }
.shop-card { padding-top: 0; }
.shop-bar {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 4px 9px;
  margin: -1px 0 10px;
  background: linear-gradient(to bottom, rgba(5,17,22,.98), rgba(5,17,22,.92));
  border-bottom: 1px solid rgba(255,178,58,.28);
  backdrop-filter: blur(5px);
}
.shop-credit { color: var(--gold); font-weight: 900; }
.shop-bar .button-row { margin-top: 0; }
.bomb-warning { border-color: rgba(255,84,56,.8); box-shadow: 0 0 35px rgba(255,84,56,.24); }
@media (max-width: 430px) {
  #hud { gap: 4px; left: 5px; right: 5px; align-items: flex-start; }
  .stat-row { gap: 3px; }
  .pill.hud-stat { padding: 5px 6px; font-size: 11px; }
  .hud-label { display: none; }
  #shopBtn, #pauseBtn, #nextBtn { padding: 6px 8px; font-size: 12px; }
  #message { top: 72px; }
  .shop-bar { padding: 8px 2px; gap: 5px; }
  .shop-bar h1 { width: 100%; font-size: 20px; margin: 0; }
  .shop-credit { font-size: 13px; }
}


#message {
  position: absolute;
  left: 50%;
  top: 62px;
  transform: translateX(-50%);
  z-index: 35;
  background: rgba(0,0,0,.68);
  border: 1px solid rgba(255,178,58,.35);
  padding: 8px 13px;
  border-radius: 999px;
  opacity: 0;
  transition: opacity .2s;
  font-weight: 900;
  text-align: center;
  max-width: 92vw;
  pointer-events: none;
}

#message.show { opacity: 1; }

#ground {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--ground);
  z-index: 5;
  background: linear-gradient(to top, #111d0c, #293916 60%, #445324);
  border-top: 3px solid #8da44a;
  box-shadow: 0 -16px 30px rgba(0,0,0,.52);
}

#launcher {
  position: absolute;
  bottom: 42px;
  left: 50%;
  width: 48px;
  height: 58px;
  transform: translateX(-50%) rotate(0deg);
  transform-origin: 50% 70%;
  z-index: 8;
  filter: drop-shadow(0 0 10px rgba(255,178,58,.42));
  pointer-events: none;
}

#launcher::before {
  content: "🚀";
  position: absolute;
  font-size: 44px;
  transform: rotate(-45deg);
  transform-origin: 50% 50%;
}

.falling {
  position: absolute;
  width: clamp(42px, 11vw, 54px);
  height: clamp(42px, 11vw, 54px);
  display: grid;
  place-items: center;
  border-radius: 50%;
  font-size: clamp(29px, 8vw, 38px);
  z-index: 12;
  touch-action: none;
  filter: drop-shadow(0 9px 8px rgba(0,0,0,.45));
  animation: wobble .7s ease-in-out infinite alternate;
}

.falling.meat {
  background: radial-gradient(circle at 35% 28%, #ffe8b8, #9f4c23 58%, #421d12);
  border: 2px solid rgba(255,199,84,.55);
  box-shadow: 0 0 16px rgba(255,178,58,.28);
}

.falling.meteor {
  background: radial-gradient(circle at 35% 28%, #b26a36, #4d3024 56%, #1d1511);
  border: 2px solid rgba(255,112,45,.58);
  box-shadow: 0 0 19px rgba(255,84,56,.34);
}

.falling.bomb {
  background: radial-gradient(circle at 35% 28%, #555, #171717 62%, #030303);
  border: 2px solid rgba(255,80,50,.75);
  box-shadow: 0 0 18px rgba(255,45,25,.55);
  animation: bombPulse .45s infinite alternate;
}

@keyframes wobble {
  from { transform: rotate(-5deg) scale(1); }
  to { transform: rotate(5deg) scale(1.04); }
}

@keyframes bombPulse {
  from { filter: drop-shadow(0 0 8px rgba(255,45,25,.7)); }
  to { filter: drop-shadow(0 0 24px rgba(255,45,25,1)); }
}

.crosshair {
  position: absolute;
  width: 64px;
  height: 64px;
  z-index: 13;
  pointer-events: none;
  transform: translate(-50%, -50%);
  border: 2px solid var(--blue);
  border-radius: 50%;
  box-shadow: 0 0 15px rgba(53,212,255,.9);
  animation: lockPulse .48s ease-in-out infinite alternate;
}

.crosshair::before, .crosshair::after {
  content: "";
  position: absolute;
  background: var(--blue);
  box-shadow: 0 0 10px rgba(53,212,255,.9);
}

.crosshair::before {
  width: 2px;
  height: 78px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.crosshair::after {
  width: 78px;
  height: 2px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

@keyframes lockPulse {
  from { opacity: .95; scale: .9; }
  to { opacity: .55; scale: 1.05; }
}

.miss-crosshair {
  position: absolute;
  width: 22px;
  height: 22px;
  z-index: 24;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(.82);
  border: 1.5px solid var(--red);
  border-radius: 50%;
  box-shadow: 0 0 9px rgba(255,84,56,.85);
  animation: missCrosshairFade .58s ease-out forwards;
}

.miss-crosshair::before,
.miss-crosshair::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  background: var(--red);
  box-shadow: 0 0 8px rgba(255,84,56,.9);
  transform: translate(-50%, -50%);
}

.miss-crosshair::before {
  width: 1.5px;
  height: 30px;
}

.miss-crosshair::after {
  width: 30px;
  height: 1.5px;
}

@keyframes missCrosshairFade {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(.74); }
  72% { opacity: .9; }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
}

.rocket {
  position: absolute;
  z-index: 16;
  pointer-events: none;
  transform-origin: 50% 50%;
  filter: drop-shadow(0 0 8px rgba(53,212,255,.75));
  will-change: left, top, transform;
}

.rocket .body {
  display: block;
  transform: rotate(45deg);
  line-height: 1;
}

.trail-particle {
  position: absolute;
  z-index: 15;
  width: var(--size);
  height: var(--size);
  left: var(--x);
  top: var(--y);
  background: var(--color);
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 8px var(--color), 0 0 18px var(--color);
  animation: particleFade var(--life) ease-out forwards;
}

.trail-particle.core {
  z-index: 16;
  box-shadow: 0 0 10px var(--color), 0 0 24px var(--color), 0 0 38px var(--color);
}

@keyframes particleFade {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  45% { opacity: .9; }
  100% {
    opacity: 0;
    transform: translate(calc(-50% + var(--drift-x)), calc(-50% + var(--drift-y))) scale(.18);
  }
}

.explosion {
  position: absolute;
  width: 20px;
  height: 20px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 18;
}

.burst {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--s);
  height: var(--s);
  border-radius: 50%;
  background: currentColor;
  color: var(--c);
  box-shadow: 0 0 18px currentColor;
  animation: burst var(--life) ease-out forwards;
}

@keyframes burst {
  from {
    opacity: 1;
    transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--start)) scale(1);
  }
  to {
    opacity: 0;
    transform: translate(-50%, -50%) rotate(calc(var(--angle) + var(--twist))) translateX(var(--distance)) scale(.14);
  }
}

.shockwave {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 14px;
  height: 14px;
  border: 3px solid var(--gold);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: shock var(--life) ease-out forwards;
}

@keyframes shock {
  to {
    width: var(--ring);
    height: var(--ring);
    opacity: 0;
  }
}

.ufo {
  position: absolute;
  z-index: 14;
  display: grid;
  place-items: center;
  width: 96px;
  height: 60px;
  font-size: 36px;
  filter: drop-shadow(0 0 18px rgba(255,210,70,.8));
  animation: ufoGlow .45s infinite alternate;
  touch-action: none;
}

.ufo::before {
  content: "🛸";
  position: absolute;
  font-size: 56px;
}

.ufo .shield {
  position: absolute;
  top: 8px;
  right: -37px;
  background: rgba(53,212,255,.92);
  color: #001a20;
  border-radius: 999px;
  padding: 3px 8px;
  font-size: 13px;
  font-weight: 900;
  border: 1px solid white;
  box-shadow: 0 0 14px rgba(53,212,255,.9);
}

.ufo .speech {
  position: absolute;
  left: 50%;
  top: -46px;
  transform: translateX(-50%);
  min-width: 110px;
  max-width: 180px;
  padding: 6px 9px;
  border-radius: 12px;
  background: rgba(0,0,0,.78);
  border: 1px solid rgba(255,255,255,.35);
  color: white;
  font-size: 12px;
  font-weight: 900;
  text-align: center;
  line-height: 1.15;
  pointer-events: none;
  opacity: 0;
  animation: ufoTalk 1.15s ease-out forwards;
  box-shadow: 0 0 12px rgba(53,212,255,.35);
}

@keyframes ufoGlow {
  from { filter: drop-shadow(0 0 8px rgba(255,210,70,.6)); }
  to { filter: drop-shadow(0 0 22px rgba(255,210,70,1)); }
}

@keyframes bundleGlow {
  from { scale: 1; filter: drop-shadow(0 0 4px #fff06a); }
  to { scale: 1.12; filter: drop-shadow(0 0 16px #fff06a); }
}

@keyframes ufoTalk {
  0% { opacity: 0; transform: translate(-50%, 8px) scale(.9); }
  12% { opacity: 1; transform: translate(-50%, 0) scale(1); }
  82% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -8px) scale(.96); }
}

#gameOverCanvas {
  position: absolute;
  inset: 0;
  z-index: 39;
  pointer-events: none;
  display: none;
}

.screen-boom {
  position: absolute;
  inset: 0;
  z-index: 80;
  background: radial-gradient(circle at center, rgba(255,255,255,.95), rgba(255,84,56,.85) 30%, rgba(0,0,0,.95) 70%);
  animation: screenBoom .85s ease-out forwards;
  pointer-events: none;
}

@keyframes screenBoom {
  0% { opacity: 0; scale: .2; }
  25% { opacity: 1; scale: 1; }
  100% { opacity: 0; scale: 1.4; }
}

#overlay {
  position: absolute;
  inset: 0;
  z-index: 40;
  display: grid;
  place-items: center;
  background: rgba(0,0,0,.58);
  padding: max(10px, var(--safe-top)) max(10px, var(--safe-right)) max(24px, var(--safe-bottom)) max(10px, var(--safe-left));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card {
  width: min(calc(var(--app-width, 100vw) - 20px), 700px);
  max-height: calc(var(--app-height, 100dvh) - 34px - var(--safe-top) - var(--safe-bottom));
  overflow-y: auto;
  overscroll-behavior: contain;
  background: var(--panel);
  border: 1px solid rgba(255,178,58,.42);
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 0 50px rgba(0,0,0,.72);
  text-align: center;
}

.card h1, .card h2 {
  margin: 0 0 8px;
  color: var(--gold);
}

.card p {
  color: var(--muted);
  line-height: 1.45;
}

.button-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
  padding-bottom: max(0px, calc(var(--safe-bottom) - 6px));
}

.shop-grid {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.shop-item {
  background: var(--panel2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 15px;
  padding: 10px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  text-align: left;
}

.shop-item strong { color: var(--blue); }
.shop-item small { color: #d6e0d2; }
.locked { opacity: .68; }
.selected {
  border-color: var(--green);
  box-shadow: 0 0 14px rgba(132,255,140,.18);
}

.preview {
  position: relative;
  margin-top: 7px;
  width: 100%;
  min-height: 98px;
  border-radius: 14px;
  background: radial-gradient(circle at center, rgba(255,255,255,.06), rgba(0,0,0,.3));
  display: grid;
  place-items: center;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.08);
}

.preview-trail {
  position: relative;
  width: 100%;
  height: 92px;
  overflow: hidden;
}

.preview-rocket {
  position: absolute;
  top: 29px;
  left: 0;
  font-size: 25px;
  z-index: 4;
  animation: previewRocketFlyLeft 1.75s linear infinite;
  filter: drop-shadow(0 0 8px rgba(53,212,255,.8));
}

.preview-rocket span {
  display: block;
  transform: rotate(225deg);
  line-height: 1;
}

.preview-dot, .preview-streak {
  position: absolute;
  left: 0;
  top: var(--top);
  animation: previewTrailFlyLeft 1.75s linear infinite;
  animation-delay: var(--delay);
  opacity: 0;
}

.preview-dot {
  width: var(--dot);
  height: var(--dot);
  background: var(--c);
  border-radius: 50%;
  box-shadow: 0 0 9px var(--c), 0 0 20px var(--c);
}

.preview-dot.big {
  box-shadow: 0 0 12px var(--c), 0 0 28px var(--c), 0 0 45px var(--c);
}

.preview-streak {
  width: var(--w);
  height: var(--h);
  border-radius: 999px;
  background: linear-gradient(to right, transparent, var(--c), transparent);
  box-shadow: 0 0 18px var(--c);
}

@keyframes previewRocketFlyLeft {
  0% { opacity: 0; transform: translateX(calc(100% + 46px)); }
  8% { opacity: 1; }
  88% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-64px); }
}

@keyframes previewTrailFlyLeft {
  0% { opacity: 0; transform: translateX(calc(100% + 46px + var(--behind))) scale(.45); }
  12% { opacity: var(--maxOpacity); }
  54% { opacity: calc(var(--maxOpacity) * .85); }
  100% { opacity: 0; transform: translateX(calc(-64px + var(--behind))) scale(.14); }
}

.preview-explosion {
  position: relative;
  width: 120px;
  height: 96px;
}

.preview-explosion span {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--s);
  height: var(--s);
  background: var(--c);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--c);
  animation: previewBurst var(--dur) ease-out infinite;
  animation-delay: var(--delay);
}

.preview-explosion::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 12px;
  height: 12px;
  border: 2px solid #ffb23a;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: previewRing var(--dur) ease-out infinite;
}

@keyframes previewBurst {
  0% { opacity: 0; transform: translate(-50%,-50%) rotate(var(--angle)) translateX(0) scale(.7); }
  14% { opacity: 1; }
  70% { opacity: .92; }
  100% { opacity: 0; transform: translate(-50%,-50%) rotate(calc(var(--angle) + var(--twist))) translateX(var(--distance)) scale(.2); }
}

@keyframes previewRing {
  0% { opacity: 0; width: 10px; height: 10px; }
  20% { opacity: 1; }
  100% { opacity: 0; width: var(--ring); height: var(--ring); }
}

.final-score-card {
  border-color: rgba(255,210,80,.85);
  background: rgba(4, 12, 18, .86);
  box-shadow:
    0 0 42px rgba(255,178,58,.34),
    0 0 90px rgba(53,212,255,.22),
    inset 0 0 35px rgba(255,255,255,.04);
  backdrop-filter: blur(4px);
}

.final-score-grid {
  display: grid;
  grid-template-columns: repeat(2,minmax(0,1fr));
  gap: 8px;
  margin: 10px 0;
}

.final-score-grid div,
.final-icon-row div {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  padding: 8px;
}

.final-score-grid strong {
  display: block;
  color: var(--gold);
  font-size: 20px;
}

.result-pop {
  opacity: 0;
  transform: translateY(12px) scale(.94);
  animation: resultPop .42s ease-out forwards;
  animation-delay: var(--delay);
}

@keyframes resultPop {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.final-icon-row {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 6px;
  margin: 8px 0;
}

.final-icon-row span {
  display: block;
  font-size: 22px;
}

.help-list {
  text-align: left;
  display: grid;
  gap: 8px;
}

.help-list div {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 14px;
  padding: 9px;
}

@media (max-width: 390px), (max-height: 700px) {
  .final-score-card {
    width: min(96vw, 420px);
    max-height: calc(var(--app-height, 100dvh) - 34px - var(--safe-top) - var(--safe-bottom));
    padding: 12px;
  }

  .final-score-card h1 {
    font-size: 24px;
    margin-bottom: 2px;
  }

  .final-score-card h2 {
    font-size: 17px;
    margin: 0 0 4px;
  }

  .final-score-card p {
    font-size: 12px;
    line-height: 1.25;
    margin: 5px 0;
  }

  .final-score-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 5px;
    margin: 6px 0;
  }

  .final-score-grid div {
    padding: 5px;
    font-size: 11px;
    border-radius: 10px;
  }

  .final-score-grid strong {
    font-size: 16px;
  }

  .final-icon-row {
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 4px;
  }

  .final-icon-row div {
    padding: 4px;
    font-size: 10px;
    border-radius: 10px;
  }

  .final-icon-row span {
    font-size: 18px;
  }
}

@media (orientation: landscape) and (max-height: 520px) {
  :root { --ground: 50px; }
  #hud { font-size: 12px; }

const SAVE_VERSION = 2;
const SAVE_KEY = "meatEorBlaster.checkpoint.v2";
const SAVE_MIRROR_KEY = "meatEorBlaster.checkpoint.mirror.v2";
const SAVE_SALT = ["Meat", "eor", "Zaqxen", "Rei", "Mark", "Morgan", "local", "checkpoint"].join("|");
let lastPeriodicSaveAt = 0;
let lastSaveProblem = "";

function makeRunId() {
  const rand = Math.floor(Math.random() * 0x7fffffff).toString(36);
  return Date.now().toString(36) + "-" + rand;
}

function clampInt(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, Math.trunc(n)));
}

function formatExactNumber(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return "0";
  return Math.trunc(n).toLocaleString("en-US");
}

function formatCompactNumber(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return "0";
  const sign = n < 0 ? "-" : "";
  const abs = Math.abs(Math.trunc(n));
  if (abs < 1000) return sign + String(abs);

  const units = [
    { value: 1000000000000, suffix: "T" },
    { value: 1000000000, suffix: "B" },
    { value: 1000000, suffix: "M" },
    { value: 1000, suffix: "K" }
  ];

  for (let i = 0; i < units.length; i++) {
    const unit = units[i];
    if (abs >= unit.value) {
      let rounded = Math.round((abs / unit.value) * 10) / 10;
      if (rounded >= 1000 && i > 0) {
        const next = units[i - 1];
        rounded = Math.round((abs / next.value) * 10) / 10;
        return sign + rounded.toFixed(1) + next.suffix;
      }
      return sign + rounded.toFixed(1) + unit.suffix;
    }
  }

  return sign + String(abs);
}

function formatCompactPair(a, b) {
  return formatCompactNumber(a) + "/" + formatCompactNumber(b);
}


function canonicalStringify(value) {
  if (value === null || typeof value !== "object") return JSON.stringify(value);
  if (Array.isArray(value)) return "[" + value.map(canonicalStringify).join(",") + "]";
  return "{" + Object.keys(value).sort().map(key => JSON.stringify(key) + ":" + canonicalStringify(value[key])).join(",") + "}";
}

function tamperHash(input, seed = 0x4d454154) {
  let h1 = 0xdeadbeef ^ seed;
  let h2 = 0x41c6ce57 ^ seed;
  for (let i = 0; i < input.length; i++) {
    const ch = input.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
  h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
  return ((h2 >>> 0).toString(36).padStart(7, "0") + (h1 >>> 0).toString(36).padStart(7, "0"));
}

function signSavePayload(payload) {
  const important = [
    payload.v,
    payload.runId,
    payload.level,
    payload.difficultyLevel,
    payload.cycle,
    payload.hardMode ? 1 : 0,
    payload.lives,
    payload.coins,
    payload.score,
    payload.missedTargets,
    payload.missedUfos,
    payload.ufoCaught,
    payload.saveContinueCount || 0,
    payload.dangerContinueCount || 0,
    payload.lastThreatGap,
    payload.savedAt
  ].join("|");
  return tamperHash(canonicalStringify(payload) + "|" + SAVE_SALT + "|" + important, 0x5a415158);
}

function validUniqueIds(values, allowedIds, requiredId) {
  const allowed = new Set(allowedIds);
  const out = [];
  for (const id of Array.isArray(values) ? values : []) {
    if (allowed.has(id) && !out.includes(id)) out.push(id);
  }
  if (requiredId && allowed.has(requiredId) && !out.includes(requiredId)) out.unshift(requiredId);
  return out;
}

function expectedCycleForLevel(level) {
  return Math.floor((Math.max(1, level) - 1) / MAX_LEVEL) + 1;
}

function expectedDifficultyForLevel(level) {
  return ((Math.max(1, level) - 1) % MAX_LEVEL) + 1;
}

function normalizeSavePayload(raw) {
  if (!raw || raw.game !== "meat-eor-blaster" || raw.v !== SAVE_VERSION) throw new Error("Unsupported save version.");

  const level = clampInt(raw.level, 1, 999999, 1);
  const expectedCycle = expectedCycleForLevel(level);
  const expectedDifficulty = expectedDifficultyForLevel(level);
  const difficultyLevel = clampInt(raw.difficultyLevel, 1, MAX_LEVEL, expectedDifficulty);
  const cycle = clampInt(raw.cycle, 1, 999999, expectedCycle);
  if (difficultyLevel !== expectedDifficulty || cycle !== expectedCycle) throw new Error("Level checkpoint mismatch.");

  const effectIds = explosionEffects.map(e => e.id);
  const trailIds = rocketTrails.map(t => t.id);
  const ownedEffects = validUniqueIds(raw.ownedEffects, effectIds, "starter");
  const ownedTrails = validUniqueIds(raw.ownedTrails, trailIds, "tiny");
  const selectedEffect = ownedEffects.includes(raw.selectedEffect) ? raw.selectedEffect : "starter";
  const selectedTrail = ownedTrails.includes(raw.selectedTrail) ? raw.selectedTrail : "tiny";

  const upgrades = raw.upgrades || {};
  const stats = raw.stats || {};
  const payload = {
    v: SAVE_VERSION,
    game: "meat-eor-blaster",
    runId: String(raw.runId || makeRunId()).slice(0, 64),
    savedAt: clampInt(raw.savedAt, 1, 4102444800000, Date.now()),
    level,
    difficultyLevel,
    cycle,
    hardMode: !!raw.hardMode,
    playerName: String(raw.playerName || "Player").slice(0, 16) || "Player",
    liteMode: !!raw.liteMode,
    activePlayMs: clampInt(raw.activePlayMs, 0, 9999999999, 0),
    lives: clampInt(raw.lives, 1, 9999, 5),
    coins: clampInt(raw.coins, -999999999, 999999999, 0),
    score: clampInt(raw.score, 0, 9999999999, 0),
    nextReady: !!raw.nextReady,
    ufoIntroSeen: !!raw.ufoIntroSeen,
    ufoCaught: clampInt(raw.ufoCaught, 0, 999999, 0),
    ufoLivesGained: clampInt(raw.ufoLivesGained, 0, 999999, 0),
    stats: {
      steak: clampInt(stats.steak, 0, 9999999, 0),
      chicken: clampInt(stats.chicken, 0, 9999999, 0),
      rib: clampInt(stats.rib, 0, 9999999, 0),
      meteor: clampInt(stats.meteor, 0, 9999999, 0)
    },
    missedTargets: clampInt(raw.missedTargets, 0, 9999999, 0),
    missedUfos: clampInt(raw.missedUfos, 0, 9999999, 0),
    saveContinueCount: clampInt(raw.saveContinueCount, 0, 999999, 0),
    dangerContinueCount: clampInt(raw.dangerContinueCount, 0, 999999, 0),
    lastDangerContinueGap: clampInt(raw.lastDangerContinueGap, 0, 999999, 0),
    lastDangerContinueKind: String(raw.lastDangerContinueKind || "").slice(0, 32),
    lastThreatGap: clampInt(raw.lastThreatGap, -9999, 999999, 999999),
    lastThreatThreshold: clampInt(raw.lastThreatThreshold, 1, 9999, 120),
    lastThreatKind: String(raw.lastThreatKind || "none").slice(0, 32),
    lastThreatRisk: clampInt(raw.lastThreatRisk, 0, 100, 0),
    upgrades: {
      rocketSize: clampInt(upgrades.rocketSize, 1, MAX_ROCKET_SIZE, 1),
      missiles: clampInt(upgrades.missiles, 1, 4, 1),
      trailLength: clampInt(upgrades.trailLength, 1, 7, 1)
    },
    ownedEffects,
    selectedEffect,
    ownedTrails,
    selectedTrail
  };

  if (!payload.ownedEffects.includes(payload.selectedEffect) || !payload.ownedTrails.includes(payload.selectedTrail)) {
    throw new Error("Selected item not owned.");
  }

  return payload;
}


function activeSaveThreatSnapshot() {
  const threshold = Math.round(Math.max(72, Math.min(170, viewportHeight() * 0.17)));
  const groundTop = viewportHeight() - (ground ? ground.offsetHeight : 70);
  let best = {
    gap: 999999,
    threshold,
    kind: "none",
    risk: 0
  };

  for (const obj of Array.isArray(state.objects) ? state.objects : []) {
    if (!obj || obj.counted || obj.type === "bomb" || obj.frozen) continue;
    const bottom = (obj.y || 0) + (obj.size || 0);
    const gap = Math.round(groundTop - bottom);
    if (gap < best.gap) {
      best = {
        gap,
        threshold,
        kind: obj.emoji || obj.type || "target",
        risk: Math.max(0, Math.min(100, Math.round((1 - gap / threshold) * 100)))
      };
    }
  }

  for (const ufo of Array.isArray(state.ufos) ? state.ufos : []) {
    if (!ufo || ufo.destroyed || ufo.frozen) continue;
    const remaining = ufo.escaping ? 0 : Math.max(0, (ufo.roamTime || 0) - (ufo.age || 0));
    const risk = ufo.escaping ? 100 : remaining <= 1.15 ? Math.round((1.15 - remaining) / 1.15 * 100) : 0;
    if (risk >= 82 && best.gap > threshold) {
      best = {
        gap: 0,
        threshold,
        kind: "UFO escape",
        risk
      };
    }
  }

  if (best.gap === 999999) best.gap = 999999;
  return best;
}

function savedThreatWasDangerous(payload) {
  if (!payload || payload.nextReady) return false;
  const gap = Number(payload.lastThreatGap);
  const threshold = Number(payload.lastThreatThreshold || 0);
  if (!Number.isFinite(gap) || !Number.isFinite(threshold) || threshold <= 0) return false;
  return gap <= threshold;
}

function savedThreatLabel(payload) {
  if (!payload || !Number.isFinite(Number(payload.lastThreatGap)) || Number(payload.lastThreatGap) >= 999999) return "No falling target near the ground.";
  const kind = payload.lastThreatKind && payload.lastThreatKind !== "none" ? payload.lastThreatKind : "target";
  const gap = Math.max(0, Number(payload.lastThreatGap));
  return `${kind} was about ${Math.round(gap)}px from the ground when last saved.`;
}

function buildSavePayload() {
  if (!state.runId) state.runId = makeRunId();
  const level = clampInt(state.level, 1, 999999, 1);
  const threat = activeSaveThreatSnapshot();
  return normalizeSavePayload({
    v: SAVE_VERSION,
    game: "meat-eor-blaster",
    runId: state.runId,
    savedAt: Date.now(),
    level,
    difficultyLevel: expectedDifficultyForLevel(level),
    cycle: expectedCycleForLevel(level),
    hardMode: !!state.hardMode,
    playerName: state.playerName || "Player",
    liteMode: !!state.liteMode,
    activePlayMs: state.activePlayMs || 0,
    lives: state.lives,
    coins: state.coins,
    score: state.score,
    nextReady: !!state.nextReady,
    ufoIntroSeen: !!state.ufoIntroSeen,
    ufoCaught: state.ufoCaught || 0,
    ufoLivesGained: state.ufoLivesGained || 0,
    stats: state.stats || {},
    missedTargets: state.missedTargets || 0,
    missedUfos: state.missedUfos || 0,
    saveContinueCount: state.saveContinueCount || 0,
    dangerContinueCount: state.dangerContinueCount || 0,
    lastDangerContinueGap: state.lastDangerContinueGap || 0,
    lastDangerContinueKind: state.lastDangerContinueKind || "",
    lastThreatGap: threat.gap,
    lastThreatThreshold: threat.threshold,
    lastThreatKind: threat.kind,
    lastThreatRisk: threat.risk,
    upgrades: state.upgrades || {},
    ownedEffects: state.ownedEffects || ["starter"],
    selectedEffect: state.selectedEffect || "starter",
    ownedTrails: state.ownedTrails || ["tiny"],
    selectedTrail: state.selectedTrail || "tiny"
  });
}

function makeSaveEnvelope(payload) {
  const sig = signSavePayload(payload);
  return {
    payload,
    sig,
    guard: tamperHash(sig + "|" + payload.runId + "|" + payload.savedAt + "|" + SAVE_SALT, 0x524549)
  };
}

function validateSaveEnvelope(envelope) {
  if (!envelope || typeof envelope !== "object") throw new Error("Missing save envelope.");
  const payload = normalizeSavePayload(envelope.payload);
  const sig = signSavePayload(payload);
  const guard = tamperHash(sig + "|" + payload.runId + "|" + payload.savedAt + "|" + SAVE_SALT, 0x524549);
  if (sig !== envelope.sig || guard !== envelope.guard) throw new Error("Save signature check failed.");
  return payload;
}

function readSaveFromKey(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    return validateSaveEnvelope(JSON.parse(raw));
  } catch (err) {
    lastSaveProblem = err && err.message ? err.message : "Save could not be read.";
    return { invalid: true };
  }
}

function readSavedCheckpoint() {
  let foundInvalid = false;
  const candidates = [readSaveFromKey(SAVE_KEY), readSaveFromKey(SAVE_MIRROR_KEY)].filter(Boolean);
  const valid = [];

  for (const item of candidates) {
    if (item.invalid) foundInvalid = true;
    else valid.push(item);
  }

  if (!valid.length) return { payload: null, invalid: foundInvalid };
  valid.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
  return { payload: valid[0], invalid: foundInvalid };
}

function saveCheckpoint(reason = "auto") {
  if (!state.running || state.gameOverShown) return false;
  try {
    const payload = buildSavePayload();
    const envelope = makeSaveEnvelope(payload);
    const serialized = JSON.stringify(envelope);
    localStorage.setItem(SAVE_KEY, serialized);
    localStorage.setItem(SAVE_MIRROR_KEY, serialized);
    lastSaveProblem = "";
    return true;
  } catch (err) {
    lastSaveProblem = err && err.message ? err.message : "Save failed.";
    return false;
  }
}

function autoSaveCheckpoint(reason = "auto") {
  if (!state.running || state.gameOverShown) return false;
  return saveCheckpoint(reason);
}

function periodicAutoSave(now = performance.now()) {
  if (!state.running || state.gameOverShown) return;
  if (now - lastPeriodicSaveAt < 6000) return;
  lastPeriodicSaveAt = now;
  saveCheckpoint("periodic");
}

function clearSavedCheckpoint() {
  try {
    localStorage.removeItem(SAVE_KEY);
    localStorage.removeItem(SAVE_MIRROR_KEY);
  } catch (err) {}
}

function savedRunSummary(payload) {
  if (!payload) return "";
  const mode = payload.hardMode ? "Hard" : "Normal";
  const status = payload.nextReady ? "level cleared" : "level start";
  const continues = payload.saveContinueCount ? ` · ${formatCompactNumber(payload.saveContinueCount)} continue${payload.saveContinueCount === 1 ? "" : "s"}` : "";
  const danger = payload.dangerContinueCount ? ` · ⚠️ ${formatCompactNumber(payload.dangerContinueCount)} danger` : "";
  return `${mode} Mode · Level ${formatCompactNumber(payload.level)} · Run ${formatCompactNumber(payload.cycle)} · ${formatCompactNumber(payload.coins)} credits · ${formatCompactNumber(payload.score)} score · ${status}${continues}${danger}`;
}

    lastDangerContinueKind: dangerContinue ? (payload.lastThreatKind || "target") : (payload.lastDangerContinueKind || ""),
    activePlayMs: payload.activePlayMs || 0,

    coins: payload.coins,

    nextReady: !!payload.nextReady,

    completingLevel: !!payload.nextReady,
    gameOverShown: false,
    ignoreViewportPauseUntil: performance.now() + 900,
    ufoSpawnedThisLevel: false,
    ufoIntroSeen: !!payload.ufoIntroSeen,
    ufoIntroPending: false,
    ufoCaught: payload.ufoCaught || 0,
    ufoLivesGained: payload.ufoLivesGained || 0,

function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1, 3), 16);
  const ag = parseInt(a.slice(3, 5), 16);
  const ab = parseInt(a.slice(5, 7), 16);
  const br = parseInt(b.slice(1, 3), 16);
  const bg = parseInt(b.slice(3, 5), 16);
  const bb = parseInt(b.slice(5, 7), 16);
  const rr = Math.round(ar + (br - ar) * t).toString(16).padStart(2, "0");
  const rg = Math.round(ag + (bg - ag) * t).toString(16).padStart(2, "0");
  const rb = Math.round(ab + (bb - ab) * t).toString(16).padStart(2, "0");
  return "#" + rr + rg + rb;
}

function updateGroundVisual() {
  if (!ground) return;

  const lives = Math.max(0, state.lives || 0);
  const ratio = Math.max(0, Math.min(1, (lives - 1) / 11));

  const top = lerpColor("#5a0c0c", "#5f8f2f", ratio);
  const mid = lerpColor("#751313", "#2f6d22", ratio);
  const bot = lerpColor("#2a0505", "#13370f", ratio);
  const border = lerpColor("#ff2d22", "#9cd65b", ratio);

  ground.style.background = `linear-gradient(to top, ${bot}, ${mid} 58%, ${top})`;
  ground.style.borderTopColor = border;
  ground.style.boxShadow = lives <= 1
    ? "0 -16px 32px rgba(255,45,34,.35)"
    : lives >= 12
      ? "0 -18px 34px rgba(92,220,80,.22)"
      : "0 -16px 30px rgba(0,0,0,.52)";

  renderGroundPlants(lives);
}

function renderGroundPlants(lives) {
  if (!ground) return;

  let desired = 0;
  if (lives >= 8) desired = Math.min(6, lives - 6);
  if (lives >= 12) desired = Math.min(16, 6 + Math.floor((lives - 11) * 1.4));
  if (lives >= 20) desired = Math.min(28, 18 + Math.floor((lives - 20) * 0.7));

  const current = Number(ground.dataset.plantCount || 0);
  if (current === desired) return;

  ground.querySelectorAll(".ground-plant").forEach(el => el.remove());
  ground.dataset.plantCount = String(desired);

  if (desired <= 0) return;

  const flowers = ["🌱", "🌷", "🌼", "🌻", "🌸"];
  const trees = ["🌳", "🌲", "🌴"];
  const plants = lives >= 14 ? flowers.concat(trees) : flowers;

  for (let i = 0; i < desired; i++) {
    const plant = document.createElement("span");
    plant.className = "ground-plant";
    const useTree = lives >= 14 && Math.random() < Math.min(0.5, (lives - 12) / 18);
    plant.textContent = useTree ? trees[Math.floor(Math.random() * trees.length)] : flowers[Math.floor(Math.random() * flowers.length)];
    plant.style.left = (2 + Math.random() * 96).toFixed(2) + "%";
    plant.style.bottom = (10 + Math.random() * 42).toFixed(1) + "px";
    plant.style.fontSize = (useTree ? 24 + Math.random() * 18 : 15 + Math.random() * 13).toFixed(1) + "px";
    plant.style.animationDelay = (Math.random() * 220).toFixed(0) + "ms";
    ground.appendChild(plant);
  }
}



function bombImmunityCount() {
  /*
    Bomb immunity is based only on current available credits.
    Spending credits can reduce available immunity.

function useBombImmunity() {

function currentEffect() {

function itemIndexById(list, id) {
  return Math.max(0, list.findIndex(item => item.id === id));
}

function liteExplosionStyle(effect) {
  const idx = itemIndexById(explosionEffects, effect?.id);
  const max = Math.max(1, explosionEffects.length - 1);
  const ratio = Math.min(1, Math.max(0, idx / max));

  /*
    Lite Mode has no particles. The circle itself intensifies by color:
    white -> yellow -> light orange -> orange -> light red -> deep red.
  */
  const palette = [
    { border: "#ffffff", glow: "rgba(255,255,255,.9)" },
    { border: "#fff4a8", glow: "rgba(255,244,168,.9)" },
    { border: "#ffd36a", glow: "rgba(255,211,106,.9)" },
    { border: "#ff9f1c", glow: "rgba(255,159,28,.95)" },
    { border: "#ff6b4a", glow: "rgba(255,107,74,.95)" },
    { border: "#c9181d", glow: "rgba(201,24,29,.95)" }
  ];

  const p = palette[Math.min(palette.length - 1, Math.floor(ratio * palette.length))];
  const lifeBonus = Math.floor(40 + ratio * 160);

  return {
    border: p.border,
    shadow: `0 0 18px ${p.glow}, 0 0 ${24 + Math.floor(ratio * 26)}px ${p.border}, inset 0 0 18px ${p.glow}`,
    lifeBonus
  };
}

function liteTrailStyle(trail) {
  const idx = itemIndexById(rocketTrails, trail?.id);
  const max = Math.max(1, rocketTrails.length - 1);
  const ratio = Math.min(1, Math.max(0, idx / max));
  const length = 30 + state.upgrades.trailLength * 9 + idx * 12;
  const height = 2 + Math.min(6, idx + Math.floor(state.upgrades.trailLength / 3));

  /*
    Line is anchored at the rocket end. It fades out toward the far tail.
    Colors intensify as trail cosmetics/Trail Length improve.
  */
  const palette = [
    "#ffffff",
    "#fff4a8",
    "#ffd36a",
    "#ff9f1c",
    "#ff6b4a",
    "#c9181d"
  ];

  const color = palette[Math.min(palette.length - 1, Math.floor(ratio * palette.length))];
  const hot = ratio >= 0.82 || state.upgrades.trailLength >= 7;
  const mid = ratio >= 0.45;

  return {
    bg: hot
      ? `linear-gradient(to right, rgba(255,255,255,0), rgba(255,244,168,.55), #ffffff, ${color})`
      : mid
        ? `linear-gradient(to right, rgba(255,255,255,0), rgba(255,244,168,.55), ${color})`
        : `linear-gradient(to right, rgba(255,255,255,0), ${color})`,
    shadow: hot
      ? `0 0 10px #ffffff, 0 0 18px ${color}`
      : mid
        ? `0 0 9px #fff4a8, 0 0 14px ${color}`
        : `0 0 8px rgba(255,255,255,.85)`,
    w: length + (hot ? 28 : mid ? 14 : 0),
    h: height + (hot ? 2 : mid ? 1 : 0)
  };
}

function createLiteTrailLine(x, y, backX, backY) {
  const trail = currentTrail();
  const lite = liteTrailStyle(trail);
  const line = document.createElement("div");
  const angle = Math.atan2(-backY, -backX);
  const life = 90 + state.upgrades.trailLength * 32;

  line.className = "lite-trail-line";
  line.style.setProperty("--x", x + "px");
  line.style.setProperty("--y", y + "px");
  line.style.setProperty("--w", lite.w + "px");
  line.style.setProperty("--h", lite.h + "px");
  line.style.setProperty("--bg", lite.bg);
  line.style.setProperty("--shadow", lite.shadow);
  line.style.setProperty("--angle", angle + "rad");
  line.style.setProperty("--life", life + "ms");

  game.appendChild(line);
  setTimeout(() => line.remove(), life + 50);
}


function currentTrail() {

function initStarfield() {
  const field = document.getElementById("starfield");
  field.innerHTML = "";
  const area = Math.max(viewportWidth() * viewportHeight(), 1);
  const count = Math.min(170, Math.max(75, Math.floor(area / 6000)));
  const cols = Math.ceil(Math.sqrt(count * viewportWidth() / Math.max(viewportHeight(), 1)));
  const rows = Math.ceil(count / cols);

  for (let i = 0; i < count; i++) {
    const star = document.createElement("span");
    const typeRoll = Math.random();
    star.className = "star" + (typeRoll < 0.16 ? " warm" : typeRoll > 0.86 ? " cool" : "");
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = ((col + Math.random()) / cols) * 100;
    const y = ((row + Math.random()) / rows) * 130 - 18;
    const size = 0.8 + Math.random() * (Math.random() < 0.12 ? 3.3 : 1.4);
    const speed = 10 + Math.random() * 52;

    star.style.setProperty("--x", x.toFixed(2) + "vw");
    star.style.setProperty("--y", y.toFixed(2) + "vh");
    star.style.setProperty("--s", size.toFixed(2) + "px");
    star.style.setProperty("--o", (0.18 + Math.random() * 0.82).toFixed(2));
    star.style.setProperty("--glow", (size * (2 + Math.random() * 6)).toFixed(2) + "px");
    star.style.setProperty("--speed", speed.toFixed(2) + "s");
    star.style.setProperty("--twinkle", (0.7 + Math.random() * 3.8).toFixed(2) + "s");
    star.style.setProperty("--delay", (-Math.random() * speed).toFixed(2) + "s");
    star.style.setProperty("--dx", (Math.random() * 120 - 60).toFixed(1) + "px");

    field.appendChild(star);
  }
}

function clearField() {

}

function desiredFallTime() {
  const raw = 5.85 - state.difficultyLevel * 0.18 - (state.cycle - 1) * 0.2 - (state.hardMode ? 0.42 : 0);
  return Math.max(state.hardMode ? 1.85 : 2.35, raw);
}

function levelSpeed() {
  const fallDistance = Math.max(280, viewportHeight() - ground.offsetHeight + 80);
  return fallDistance / desiredFallTime();
}

function spawnInterval() {
  const raw = 850 - state.difficultyLevel * 32 - (state.cycle - 1) * 24 - (state.hardMode ? 90 : 0);
  return Math.max(state.hardMode ? 280 : 360, raw);
}

function waveTotalForLevel(level) {
  /*
    Total means required meat-eor/meteor targets only.
    Bombs are extra hazards and do not count toward this target quota.
    Displayed level keeps climbing forever, while difficultyLevel cycles every 12.
  */
  const base = 7 + state.difficultyLevel + Math.floor((state.cycle - 1) * 3);
  const hardBonus = state.hardMode ? 4 + Math.floor(state.cycle * 1.5) : 0;
  return Math.min(base + hardBonus, state.hardMode ? 46 : 34);
}

function bombQuotaForLevel() {
  if (!state.hardMode && state.cycle <= 1) return 0;
  const base = state.hardMode ? 1 + state.cycle + Math.floor(state.difficultyLevel / 3) : state.cycle + Math.floor(state.difficultyLevel / 4);
  return Math.min(base, state.hardMode ? 12 : 7);
}

function blastRadius() {
  const effect = currentEffect();
  const visualBonus = effect ? effect.distanceBonus * 0.18 : 0;
  return 16 + state.upgrades.rocketSize * 16 + visualBonus;
}

function rocketFontSize() {
  /*
    Bigger Rocket Size should visibly mean bigger rocket and bigger blast.
    Approximate visual size tracks blast radius growth.
  */
  return Math.min(78, 18 + state.upgrades.rocketSize * 8.5);
}

function prepareUfoForLevel() {
  if (state.level === 1 && state.cycle === 1 && !state.ufoIntroSeen) {
    state.ufoWillAppear = true;
    state.ufoIntroPending = true;
    state.ufoDelay = 0;
    return;
  }

  const chance = Math.min(0.28 + state.cycle * 0.04 + Math.floor(state.level / 5) * 0.06, 0.58);
  state.ufoWillAppear = Math.random() < chance;
  state.ufoIntroPending = false;
  state.ufoDelay = 0;
}

function maxObjectsToSpawn() {
  return state.total + state.bombQuota;
}

function shouldSpawnBomb() {
  if (state.bombQuota <= 0 || state.bombsSpawned >= state.bombQuota || state.spawned < 2) return false;
  return Math.random() < 0.2 + state.cycle * 0.03;
}

function spawnObject() {
  if (state.spawned >= maxObjectsToSpawn()) return;

  const nonBombClearedOrSpawned = state.objects.filter(o => o.type !== "bomb").length + state.cleared;
  const mustSpawnBomb = nonBombClearedOrSpawned >= state.total && state.bombsSpawned < state.bombQuota;
  const canSpawnNonBomb = nonBombClearedOrSpawned < state.total;
  const isBomb = mustSpawnBomb || (!canSpawnNonBomb ? true : shouldSpawnBomb());
  const isMeat = !isBomb && Math.random() < 0.68;

  const el = document.createElement("div");
  el.className = "falling " + (isBomb ? "bomb" : isMeat ? "meat" : "meteor");
  const emoji = isBomb ? "💣" : isMeat ? meats[Math.floor(Math.random() * meats.length)] : "☄️";
  el.textContent = emoji;

  const size = Math.min(Math.max(viewportWidth() * 0.11, 42), 54);
  const x = Math.random() * Math.max(1, viewportWidth() - size - 18) + 9;
  const y = -70;

  el.style.left = x + "px";
  el.style.top = y + "px";

  const obj = {
    el,
    x,
    y,
    size,
    speed: levelSpeed() * (0.92 + Math.random() * 0.18),
    reward: isBomb ? 0 : isMeat ? 3 : 5,
    emoji,
    type: isBomb ? "bomb" : isMeat ? "meat" : "meteor",
    counted: false,
    frozen: false,
    lockedX: null,
    lockedY: null,
    crosshair: null,
    rocketsLaunched: 0
  };

  el.addEventListener("pointerdown", e => {
    e.stopPropagation();
    updatePointer(e.clientX, e.clientY);
    if (obj.type === "bomb") triggerBombGameOver();
    else lockTarget(obj);
  });

  game.appendChild(el);
  state.objects.push(obj);
  state.spawned++;
  if (isBomb) state.bombsSpawned++;
}

function lockTarget(obj) {
  if (!state.running || state.paused || !obj || obj.counted) return;

  if (!obj.frozen) {
    obj.frozen = true;
    obj.lockedX = obj.x + obj.size / 2;
    obj.lockedY = obj.y + obj.size / 2;
    obj.el.style.opacity = "0.88";
    obj.el.style.animationPlayState = "paused";
    obj.crosshair = createCrosshair(obj.lockedX, obj.lockedY);
  }

  if (obj.rocketsLaunched >= state.upgrades.missiles) {
    return;
  }

  obj.rocketsLaunched++;
  launchRocket(obj, obj.lockedX, obj.lockedY, false);
}

function createCrosshair(x, y) {
  const ch = document.createElement("div");
  ch.className = "crosshair";
  ch.style.left = x + "px";
  ch.style.top = y + "px";
  game.appendChild(ch);
  return ch;
}

function createMissCrosshair(x, y) {
  if (!state.running || state.paused || overlay.style.display !== "none") return;

  const ch = document.createElement("div");
  ch.className = "miss-crosshair";
  ch.style.left = x + "px";
  ch.style.top = y + "px";
  game.appendChild(ch);
  setTimeout(() => ch.remove(), 650);
}

function launchRocket(target, tx, ty, isSpecialUfo = false) {
  const rocket = document.createElement("div");
  rocket.className = "rocket";
  rocket.innerHTML = `<span class="body">🚀</span>`;

  const startX = viewportWidth() / 2;
  const startY = viewportHeight() - 74;

  rocket.style.left = startX + "px";
  rocket.style.top = startY + "px";
  rocket.style.fontSize = (isSpecialUfo ? rocketFontSize() + 8 : rocketFontSize()) + "px";

  game.appendChild(rocket);

  state.rockets.push({
    el: rocket,
    x: startX,
    y: startY,
    lastX: startX,
    lastY: startY,
    tx,
    ty,
    target,
    isSpecialUfo,
    speed: isSpecialUfo ? 1500 : 900 + state.upgrades.rocketSize * 80,
    trailTimer: 999
  });
}

function createRocketTrailParticle(x, y, backX = 0, backY = 1, core = false) {
  /*
    Lite Mode intentionally has no particles.
    It draws one simple fading line behind the rocket instead.
  */
  if (state.liteMode) {
    if (core) createLiteTrailLine(x, y, backX, backY);
    return;
  }

  const trail = currentTrail();
  const p = document.createElement("div");
  const color = trail.colors[Math.floor(Math.random() * trail.colors.length)];
  const size = trail.particleSize + (core ? 2.5 : 0) + Math.random() * 2;
  const life = 170 + state.upgrades.trailLength * 95 + trail.lifeBonus;
  const sideX = -backY;
  const sideY = backX;
  const along = Math.random() * (8 + state.upgrades.trailLength * 7);
  const side = (Math.random() - 0.5) * trail.spread;

  const px = x + backX * along + sideX * side;
  const py = y + backY * along + sideY * side;

  p.className = "trail-particle" + (core ? " core" : "");
  p.style.setProperty("--x", px + "px");
  p.style.setProperty("--y", py + "px");
  p.style.setProperty("--size", size + "px");
  p.style.setProperty("--color", color);
  p.style.setProperty("--life", life + "ms");
  p.style.setProperty("--drift-x", (backX * (18 + Math.random() * 26) + (Math.random() - 0.5) * 8) + "px");
  p.style.setProperty("--drift-y", (backY * (18 + Math.random() * 26) + (Math.random() - 0.5) * 8) + "px");

  game.appendChild(p);
  setTimeout(() => p.remove(), life + 80);
}

function updateObjects(dt) {
  const groundTop = viewportHeight() - ground.offsetHeight;

  state.objects = state.objects.filter(obj => {
    if (!obj.frozen) {
      obj.y += obj.speed * dt;
      obj.el.style.top = obj.y + "px";
    }

    if (obj.crosshair) {
      obj.crosshair.style.left = obj.lockedX + "px";
      obj.crosshair.style.top = obj.lockedY + "px";
    }

    if (!obj.frozen && obj.y + obj.size >= groundTop) {
      if (obj.counted) return false;
      obj.counted = true;
      if (obj.crosshair) obj.crosshair.remove();
      obj.el.remove();

      if (obj.type !== "bomb") {
        state.lives--;
        state.missedTargets++;
        document.body.classList.add("damage-flash");
        setTimeout(() => document.body.classList.remove("damage-flash"), 300);
      }

      if (obj.type !== "bomb") {
        state.cleared++;
      }
      updateUI();

      if (state.lives <= 0) gameOver();
      else checkLevelComplete();

      return false;
    }

    return true;
  });
}

function updateRockets(dt, onlySpecial = false) {
  state.rockets = state.rockets.filter(r => {
    if (onlySpecial && !r.isSpecialUfo) return true;
    if (!r.el || !document.body.contains(r.el)) return false;

    const dx = r.tx - r.x;
    const dy = r.ty - r.y;
    const dist = Math.hypot(dx, dy) || 1;

    const angle = Math.atan2(dy, dx);
    r.el.style.transform = `rotate(${angle}rad)`;

    if (dist < 28 + state.upgrades.rocketSize * 6) {
      r.el.remove();

      if (r.isSpecialUfo) {
        specialUfoExplosion(r.tx, r.ty, r.target);
        return false;
      }

      createExplosion(r.tx, r.ty);
      applyBlastDamage(r.tx, r.ty);

      if (r.target && !r.target.counted) {
        destroyObject(r.target, true);
      }

      return false;
    }

    const step = Math.min(dist, r.speed * dt);
    r.lastX = r.x;
    r.lastY = r.y;
    r.x += (dx / dist) * step;
    r.y += (dy / dist) * step;

    const moveDx = r.x - r.lastX;
    const moveDy = r.y - r.lastY;
    const moveDist = Math.hypot(moveDx, moveDy) || 1;
    const backX = -moveDx / moveDist;
    const backY = -moveDy / moveDist;

    r.trailTimer += dt * 1000;
    const trail = currentTrail();
    const particleDelay = Math.max(16, 54 - trail.density * 4 - state.upgrades.trailLength * 2);

    if (r.trailTimer >= particleDelay) {
      r.trailTimer = 0;
      const rocketBackOffset = (isFinite(parseFloat(r.el.style.fontSize)) ? parseFloat(r.el.style.fontSize) : rocketFontSize()) * 0.42;
      const trailX = r.x + backX * rocketBackOffset;
      const trailY = r.y + backY * rocketBackOffset;
      createRocketTrailParticle(trailX, trailY, backX, backY, true);
      const emitCount = state.liteMode ? 1 : trail.density;
      for (let i = 0; i < emitCount; i++) createRocketTrailParticle(trailX, trailY, backX, backY, false);
    }

    r.el.style.left = r.x + "px";
    r.el.style.top = r.y + "px";
    return true;
  });
}

function destroyObject(obj, reward) {
  if (!obj || obj.counted) return;
  obj.counted = true;
  if (obj.crosshair) obj.crosshair.remove();
  if (obj.el && document.body.contains(obj.el)) obj.el.remove();
  state.objects = state.objects.filter(o => o !== obj);

  if (reward) {
    addCredits(obj.reward);
    state.score += obj.reward * 10 + state.level * 2 + state.cycle * 5;

    if (obj.type === "meteor") {
      state.stats.meteor++;
    } else if (obj.emoji === "🥩") {
      state.stats.steak++;
    } else if (obj.emoji === "🍗") {
      state.stats.chicken++;
    } else if (obj.emoji === "🍖") {
      state.stats.rib++;
    }
  }

  state.cleared++;
  updateUI();
  checkLevelComplete();
}

function applyBlastDamage(x, y) {
  const effect = currentEffect();
  if (!effect) return;
  const radius = blastRadius();

  [...state.objects].forEach(obj => {
    if (!obj.el || !document.body.contains(obj.el) || obj.type === "bomb" || obj.counted) return;
    const cx = obj.frozen ? obj.lockedX : obj.x + obj.size / 2;
    const cy = obj.frozen ? obj.lockedY : obj.y + obj.size / 2;
    if (Math.hypot(cx - x, cy - y) <= radius) {
      destroyObject(obj, true);
      createExplosion(cx, cy, 0.55);
    }
  });
}

function createExplosion(x, y, scale = 1) {
  const effect = currentEffect();
  if (!effect) return;

  const wrap = document.createElement("div");
  wrap.className = "explosion";
  wrap.style.left = x + "px";
  wrap.style.top = y + "px";

  const liteModeExplosion = !!state.liteMode;
  const lite = liteExplosionStyle(effect);
  const ring = blastRadius() * 2.1 * scale;
  const life = Math.floor((effect.life + (liteModeExplosion ? lite.lifeBonus : 0)) * scale);

  const shock = document.createElement("div");
  shock.className = "shockwave";
  shock.style.borderColor = liteModeExplosion ? lite.border : (effect.colors[0] || "#ffffff");
  shock.style.setProperty("--ring", ring + "px");
  shock.style.setProperty("--life", life + "ms");
  shock.style.boxShadow = (effect.radiusOnly || liteModeExplosion)
    ? (liteModeExplosion ? lite.shadow : "0 0 20px rgba(255,255,255,.85), inset 0 0 16px rgba(255,255,255,.35)")
    : "";
  wrap.appendChild(shock);

  /*
    Lite Mode intentionally has no particle bursts.
    It only shows colored circles so low-spec devices stay smooth.
  */
  if (!effect.radiusOnly && !liteModeExplosion) {
    const particles = Math.floor((effect.particles + state.upgrades.rocketSize * 4) * scale);
    const distance = (32 + effect.distanceBonus + state.upgrades.rocketSize * 8) * scale;

    for (let i = 0; i < particles; i++) {
      const p = document.createElement("div");
      p.className = "burst";
      p.style.setProperty("--c", effect.colors[Math.floor(Math.random() * effect.colors.length)]);
      p.style.setProperty("--s", (4 + Math.random() * 6) + "px");
      p.style.setProperty("--angle", (360 / particles * i + Math.random() * 18) + "deg");
      p.style.setProperty("--start", "0px");
      p.style.setProperty("--distance", (distance + Math.random() * 28) + "px");
      p.style.setProperty("--life", (life + Math.random() * 260) + "ms");
      p.style.setProperty("--twist", (effect.id === "spiral" || effect.id === "ultimate" ? 160 : 0) + "deg");
      wrap.appendChild(p);
    }
  }

  game.appendChild(wrap);
  setTimeout(() => wrap.remove(), life + 650);
}

function createMeatExplosion(x, y) {
  /*
    Comedic UFO reward blast:
    very large, readable meats thrown across the screen.
    Fewer nodes, no tiny meat crumbs, reliable on mobile.
  */
  const isMobile = window.matchMedia("(pointer: coarse)").matches || viewportWidth() <= 600;
  const style = document.createElement("style");
  style.textContent = `
    @keyframes meatBurst {
      0% {
        opacity: 0;
        transform: translate(-50%,-50%) rotate(var(--angle)) translateX(0) scale(.35) rotate(0deg);
      }
      10% { opacity: 1; }
      68% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(-50%,-50%) rotate(var(--angle)) translateX(var(--distance)) scale(.72) rotate(var(--spin));
      }
    }
    @keyframes meatScreenFlash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.35); }
      15% { opacity: .78; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.45); }
    }
  `;

  const master = document.createElement("div");
  master.className = "explosion";
  master.style.left = x + "px";
  master.style.top = y + "px";
  master.style.zIndex = "23";
  master.appendChild(style);

  const flash = document.createElement("div");
  flash.style.position = "absolute";
  flash.style.left = "50%";
  flash.style.top = "50%";
  flash.style.width = isMobile ? "46vmax" : "56vmax";
  flash.style.height = isMobile ? "46vmax" : "56vmax";
  flash.style.borderRadius = "50%";
  flash.style.background = "radial-gradient(circle, rgba(255,255,255,.9), rgba(255,178,58,.5) 34%, rgba(255,84,56,.26) 58%, transparent 75%)";
  flash.style.transform = "translate(-50%, -50%)";
  flash.style.animation = "meatScreenFlash 1050ms ease-out forwards";
  master.appendChild(flash);

  const meats = ["🥩", "🍗", "🍖", "🥓", "🍔", "🌭"];
  const particleCount = isMobile ? 14 : 22;
  const maxDistance = Math.max(viewportWidth(), viewportHeight()) * (isMobile ? 0.72 : 0.84);

  for (let i = 0; i < particleCount; i++) {
    const p = document.createElement("div");
    p.textContent = meats[Math.floor(Math.random() * meats.length)];
    p.style.position = "absolute";
    p.style.left = "50%";
    p.style.top = "50%";

    /*
      Mobile meat-eors are roughly 42-54px objects.
      These are intentionally comparable or larger so players can instantly recognize them.
    */
    const hero = Math.random() > 0.58;
    const fontSize = hero
      ? (isMobile ? 86 : 104) + Math.random() * (isMobile ? 18 : 28)
      : (isMobile ? 58 : 72) + Math.random() * (isMobile ? 18 : 24);

    p.style.fontSize = fontSize + "px";
    p.style.setProperty("--angle", (i * 360 / particleCount + Math.random() * 24) + "deg");
    p.style.setProperty("--distance", (80 + Math.random() * maxDistance) + "px");
    p.style.setProperty("--spin", (Math.random() * 600 - 300) + "deg");
    p.style.animation = `meatBurst ${isMobile ? 1650 : 1900}ms cubic-bezier(.13,.72,.2,1) forwards`;
    p.style.animationDelay = (Math.random() * 45) + "ms";
    master.appendChild(p);
  }

  const ringCount = isMobile ? 1 : 2;
  for (let ring = 0; ring < ringCount; ring++) {
    const shock = document.createElement("div");
    shock.className = "shockwave";
    shock.style.borderColor = ring ? "#ffb23a" : "#ffffff";
    shock.style.setProperty("--ring", (isMobile ? 280 : 360) + ring * 220 + "px");
    shock.style.setProperty("--life", (840 + ring * 190) + "ms");
    master.appendChild(shock);
  }

  game.appendChild(master);
  setTimeout(() => master.remove(), isMobile ? 2100 : 2500);
}



function removeUfoMeatDecorations(ufoEl) {
  if (!ufoEl) return;
  ufoEl.querySelectorAll(".ufo-meat, .bundle").forEach(el => el.remove());
  if (!ufoEl.textContent.includes("🛸")) {
    ufoEl.insertBefore(document.createTextNode("🛸"), ufoEl.firstChild);
  }
}

function shouldUfoDropHazards() {
  return state.level >= 30;
}

function spawnUfoDrop(ufo, forcedSlot = false) {
  if (!ufo || !ufo.el || !document.body.contains(ufo.el)) return;

  const isSlot = forcedSlot || Math.random() < 0.12;
  const icons = ["🔪", "🔨", "🔧"];
  const icon = isSlot ? "🎰" : icons[Math.floor(Math.random() * icons.length)];

  const el = document.createElement("div");
  const dropSize = isSlot ? 46 : 42;
  const dropX = ufo.x - dropSize / 2;
  const dropY = ufo.y - dropSize / 2 + 10;

  el.className = "falling ufo-drop " + (isSlot ? "slot" : "tool");
  el.textContent = icon;
  el.style.left = dropX + "px";
  el.style.top = dropY + "px";
  el.style.width = dropSize + "px";
  el.style.height = dropSize + "px";
  el.style.fontSize = isSlot ? "42px" : "38px";
  game.appendChild(el);

  const speed = (state.hardMode ? 150 : 125) + Math.min(120, state.cycle * 7 + state.difficultyLevel * 3);
  ufoDrops.push({
    el,
    x: dropX,
    y: dropY,
    vy: speed,
    type: isSlot ? "slot" : "tool",
    cost: isSlot ? (100 + Math.floor(Math.random() * 901)) : 0,
    counted: false
  });
}

function updateUfoDrops(dt) {
  ufoDrops = ufoDrops.filter(drop => {
    drop.y += drop.vy * dt;
    drop.el.style.left = drop.x + "px";
    drop.el.style.top = drop.y + "px";

    if (drop.y > viewportHeight() - ground.offsetHeight - 14) {
      if (!drop.counted) {
        drop.counted = true;
        if (drop.type === "slot") {
          state.coins -= drop.cost;
          showMessage("🎰 Slot machine took " + formatCompactNumber(drop.cost) + " credits!");
        } else {
          state.lives--;
          document.body.classList.add("damage-flash");
          setTimeout(() => document.body.classList.remove("damage-flash"), 300);
          showMessage(drop.el.textContent + " UFO junk hit the ground! -1 life");
        }
        updateUI();
        if (state.lives <= 0) gameOver();
      }

      drop.el.remove();
      return false;
    }

    return true;
  });
}

function clearUfoDropsForLevelComplete() {
  ufoDrops.forEach(d => d.el?.remove());
  ufoDrops = [];
}

function maybeSpawnUfo() {
  if (state.paused || state.nextReady || state.completingLevel) return;
  if (!state.ufoWillAppear || state.ufoSpawnedThisLevel) return;
  if (state.spawned < Math.ceil(state.total / 2)) return;

  state.ufoSpawnedThisLevel = true;

  if (state.ufoIntroPending && !state.ufoIntroSeen) {
    showUfoIntro();
  } else {
    spawnUfo();
  }
}

function showUfoIntro() {
  state.paused = true;
  state.ufoIntroSeen = true;
  state.ufoIntroPending = false;

  const shields = ufoShieldCount();
  const speed = ufoSpeed();
  const reward = ufoReward(shields);

  overlay.style.display = "grid";
  overlay.innerHTML = `
    <div class="card">
      <h1>Bonus UFO Incoming 🛸</h1>
      <p>
        A glowing bonus meat bundle is being carried by a UFO. It appears after half of the level,
        flies randomly around the screen, and escapes if you do not catch it.
      </p>
      <p>
        The UFO has <strong>${shields} shield${shields === 1 ? "" : "s"}</strong>.
        Tap it to remove shields. Multi-Missile Tap removes more UFO shields per tap.
        When the shield breaks, the game pauses and a special rocket destroys it with a heavy meat explosion.
      </p>
      <p>
        Reward this time: <strong>${formatCompactNumber(reward)} credits</strong> plus <strong>${formatCompactNumber(ufoLifeReward())} extra life/lives</strong>. Current UFO speed rating:
        <strong>${Math.round(speed)}</strong>.
      </p>
      <p>
        As level and run cycle increase, the UFO becomes faster, gains more shields up to a fair cap, stays longer, and gives higher rewards.
      </p>
      <p>
        Fun side note: the UFO is piloted by <strong>Zaqxen Rei</strong>, which explains the unstable flying.
      </p>
      <button onclick="startIntroUfo()">Start UFO Bonus</button>
    </div>
  `;
}

window.startIntroUfo = function() {
  overlay.style.display = "none";
  state.paused = false;
  state.lastTime = performance.now();
  resetActiveTimer();
  spawnUfo();
};

function ufoShieldCount() {
  /*
    Starts easy, scales slowly, and has a cap so UFOs stay fun and possible.
    Hard Mode can reach slightly higher shields, but never infinite.
  */
  const raw = 1 + Math.floor(state.difficultyLevel / 4) + Math.floor((state.cycle - 1) / 2);
  return Math.min(state.hardMode ? 9 : 7, raw);
}

function ufoSpeed() {
  return 145 + state.difficultyLevel * 13 + state.cycle * 20;
}

function ufoReward(shields) {
  return 55 + state.difficultyLevel * 10 + state.cycle * 35 + shields * 12;
}

function ufoLifeReward() {
  return Math.max(1, Math.min(5, 1 + Math.floor(state.difficultyLevel / 4) + Math.floor((state.cycle - 1) / 2)));
}

function spawnUfo() {
  const el = document.createElement("div");
  el.className = "ufo";
  const shields = ufoShieldCount();
  el.innerHTML = `🛸<div class="shield">${shields}</div>`;

  const safeTop = Math.max(82, viewportHeight() * 0.14);
  const safeBottom = Math.max(safeTop + 40, Math.min(viewportHeight() - ground.offsetHeight - 95, viewportHeight() * 0.68));
  const safeLeft = 24;
  const safeRight = Math.max(safeLeft + 120, viewportWidth() - 120);
  const x = safeLeft + Math.random() * Math.max(1, safeRight - safeLeft);
  const y = safeTop + Math.random() * Math.max(1, safeBottom - safeTop);
  const angle = Math.random() * Math.PI * 2;
  const speed = ufoSpeed();

  Object.assign(el.style, { left: x + "px", top: y + "px" });

  const ufo = {
    el, x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    age: 0,
    roamTime: Math.min(state.hardMode ? 11.5 : 10.5, 5.8 + shields * 0.9 + Math.min(2.2, state.cycle * 0.15)),
    escapeTime: 2.2,
    shields,
    reward: ufoReward(shields),
    escaping: false,
    changeTimer: 0,
    safeTop, safeBottom, safeLeft, safeRight,
    frozen: false,
    destroyed: false,
    lastTapAt: 0,
    dropTimer: shouldUfoDropHazards() ? 0.85 + Math.random() * 1.25 : Infinity,
    slotDropped: false
  };

  el.addEventListener("pointerdown", e => {
    e.stopPropagation();
    updatePointer(e.clientX, e.clientY);
    tapUfo(ufo);
  });

  game.appendChild(el);
  removeUfoMeatDecorations(el);
  state.ufos.push(ufo);
  ufoSay(ufo, "Zaqxen Rei is flying!");
  setTimeout(() => ufoSay(ufo, "Wobble mode ON!"), 1300);
  showMessage("Shielded bonus UFO! Tap it " + shields + " times!");
}

function tapUfo(ufo) {
  if (!state.running || state.paused || !ufo || ufo.destroyed || ufo.escaping) return;

  const now = performance.now();
  if (ufo.lastTapAt && now - ufo.lastTapAt < 180) return;
  ufo.lastTapAt = now;

  const shieldDamage = Math.max(1, state.upgrades.missiles);
  ufo.shields -= shieldDamage;
  const badge = ufo.el.querySelector(".shield");
  if (badge) badge.textContent = Math.max(0, ufo.shields);

  createHitSpark(ufo.x + 48, ufo.y + 30);

  if (ufo.shields > 0) {
    const comments = [
      "Shield activated!",
      "Nice try, meat hunter!",
      "My shield says nope!",
      "Bonk! Still flying!",
      "Zaqxen dodged that!"
    ];
    ufoSay(ufo, comments[Math.floor(Math.random() * comments.length)] + " -" + shieldDamage + " shield!");
    showMessage("UFO shields hit for " + shieldDamage + " — " + ufo.shields + " left!");

    /*
      Do not let holding/clicking trap the UFO in one spot.
      A valid hit makes it dodge harder and change course.
    */
    const speed = Math.max(ufoSpeed(), Math.hypot(ufo.vx, ufo.vy) * 1.18);
    const angle = Math.random() * Math.PI * 2;
    ufo.vx = Math.cos(angle) * speed;
    ufo.vy = Math.sin(angle) * speed;
    ufo.changeTimer = -0.25;
  } else {
    beginSpecialUfoDestruction(ufo);
  }
}

function beginSpecialUfoDestruction(ufo) {
  if (ufo.destroyed) return;

  ufo.destroyed = true;
  ufo.frozen = true;
  state.paused = true;

  ufo.vx = 0;
  ufo.vy = 0;
  ufoSay(ufo, "Shield down!");

  /*
    Shield is down: pause gameplay and immediately launch the special rocket.
    The main loop keeps special rockets moving even while paused.
  */
  overlay.style.display = "none";
  showMessage("UFO shield down! Special rocket launched!");

  launchRocket(ufo, ufo.x + 48, ufo.y + 30, true);
  state.lastTime = performance.now();
  resetActiveTimer();
}

function updateUfos(dt) {
  state.ufos = state.ufos.filter(ufo => {
    if (ufo.destroyed || ufo.frozen) return true;

    ufo.age += dt;

    if (shouldUfoDropHazards() && !ufo.capturing && !ufo.escaping) {
      if (!Number.isFinite(ufo.dropTimer)) {
        ufo.dropTimer = 0.85 + Math.random() * 1.25;
      }

      ufo.dropTimer -= dt;
      if (ufo.dropTimer <= 0) {
        spawnUfoDrop(ufo, false);
        ufo.dropTimer = 2.4 + Math.random() * (state.hardMode ? 2.3 : 3.4);
      }

      if (!ufo.slotDropped && ufo.age >= ufo.roamTime - 0.45) {
        ufo.slotDropped = true;
        spawnUfoDrop(ufo, true);
      }
    }
    ufo.changeTimer += dt;

    if (!ufo.escaping && ufo.age >= ufo.roamTime) {
      ufo.escaping = true;
      ufo.age = 0;
      const exit = Math.random() < 0.5 ? -180 : viewportWidth() + 180;
      const dx = exit - ufo.x;
      const dy = (ufo.y + (Math.random() - 0.5) * 120) - ufo.y;
      const dist = Math.hypot(dx, dy) || 1;
      const speed = Math.hypot(ufo.vx, ufo.vy) * 1.45;
      ufo.vx = dx / dist * speed;
      ufo.vy = dy / dist * speed;
      ufoSay(ufo, "Bye bye! 🛸");
      showMessage("The bonus UFO escaped. Bye bye!");
    }

    if (!ufo.escaping && ufo.changeTimer > 0.55 + Math.random() * 0.45) {
      ufo.changeTimer = 0;
      const speed = Math.hypot(ufo.vx, ufo.vy) * (0.94 + Math.random() * 0.16);
      const angle = Math.atan2(ufo.vy, ufo.vx) + (Math.random() - 0.5) * 1.35;
      ufo.vx = Math.cos(angle) * speed;
      ufo.vy = Math.sin(angle) * speed;
    }

    ufo.x += ufo.vx * dt;
    ufo.y += ufo.vy * dt;

    if (!ufo.escaping) {
      if (ufo.x < ufo.safeLeft) { ufo.x = ufo.safeLeft; ufo.vx = Math.abs(ufo.vx); }
      if (ufo.x > ufo.safeRight) { ufo.x = ufo.safeRight; ufo.vx = -Math.abs(ufo.vx); }
      if (ufo.y < ufo.safeTop) { ufo.y = ufo.safeTop; ufo.vy = Math.abs(ufo.vy); }
      if (ufo.y > ufo.safeBottom) { ufo.y = ufo.safeBottom; ufo.vy = -Math.abs(ufo.vy); }
    }

    ufo.el.style.left = ufo.x + "px";
    ufo.el.style.top = ufo.y + "px";

    if (ufo.escaping && ufo.age > ufo.escapeTime) {
      state.missedUfos++;
      saveCheckpoint("missed-ufo");
      ufo.el.remove();
      return false;
    }

    return true;
  });
}

function ufoSay(ufo, text) {

function remainingFallingObjects() {
  return state.objects.filter(obj => obj.el && document.body.contains(obj.el)).length;
}

function removeAllActiveObjectsForCompletion() {
  clearUfoDropsForLevelComplete();
  state.objects.forEach(obj => {
    if (obj.crosshair) obj.crosshair.remove();
    if (obj.el && document.body.contains(obj.el)) obj.el.remove();
  });
  state.objects = [];
  state.rockets.forEach(r => {
    if (r.el && document.body.contains(r.el)) r.el.remove();
  });
  state.rockets = [];
}

function levelCompletionConditionMet() {
  if (state.cleared >= state.total) return true;
  return state.spawned >= state.total && remainingFallingObjects() === 0;
}

function setNextLevelReady(reason = "Level complete!") {
  if (!state.running || state.nextReady) return;
  state.nextReady = true;
  state.completingLevel = true;
  state.ignoreViewportPauseUntil = performance.now() + 900;
  state.paused = true;
  setNextButtonVisible(true);
  setPauseButtonNormal();
  state.cleared = Math.max(state.cleared, state.total);
  updateUI();
  showMessage(reason);

  if (!state.levelCompleteShown) {
    state.levelCompleteShown = true;
    setTimeout(showLevelComplete, 180);
  }
}

function checkCompletionFailsafe(dt = 0, force = false) {
  if (!state.running || state.nextReady) return;

  /*
    Completion is intentionally strict:
    - destroyed objects increment cleared
    - objects that hit the ground increment cleared
    - the level ends only when cleared >= total
    This prevents the game from ending while untouched meteors are still on screen.
  */
  if (state.cleared >= state.total) {
    removeAllActiveObjectsForCompletion();
    updateUI();
    setNextLevelReady("Level complete!");
    return;
  }

  /*
    Safe fallback only when every object was spawned AND none remain on screen.
    This catches DOM/removal glitches without counting visible meteors early.
  */
  if (state.spawned >= state.total && remainingFallingObjects() === 0) {
    state.cleared = Math.max(state.cleared, state.total);
    updateUI();
    setNextLevelReady("Level complete!");
    return;
  }

  state.completionGrace = 0;
}

function checkLevelComplete() {
  checkCompletionFailsafe(0, true);
}

function getUnlocksForLevel(level) {
  const unlocked = [];
  explosionEffects.forEach(e => { if (e.unlockLevel === level) unlocked.push("Explosion: " + e.name); });
  rocketTrails.forEach(t => { if (t.unlockLevel === level) unlocked.push("Trail: " + t.name); });
  upgradeItems.forEach(u => { if (u.unlockLevel === level) unlocked.push("Upgrade: " + u.name); });
  return unlocked;
}


function bestAffordableShopNotice() {
  const candidates = [];

  for (const item of upgradeItems) {
    const lvl = state.upgrades[item.key];
    const cost = item.base * lvl;
    if (state.level >= item.unlockLevel && lvl < item.max && state.coins >= cost) {
      candidates.push({
        type: "Upgrade",
        name: item.name,
        cost,
        priority: cost + lvl * 25
      });
    }
  }

  for (const effect of explosionEffects) {
    if (canBuyEffect(effect)) {
      const idx = itemIndexById(explosionEffects, effect.id);
      candidates.push({
        type: "Explosion",
        name: effect.name,
        cost: effect.cost,
        priority: effect.cost + idx * 80
      });
    }
  }

  for (const trail of rocketTrails) {
    if (canBuyTrail(trail)) {
      const idx = itemIndexById(rocketTrails, trail.id);
      candidates.push({
        type: "Trail",
        name: trail.name,
        cost: trail.cost,
        priority: trail.cost + idx * 60
      });
    }
  }

  if (!candidates.length) return "";

  candidates.sort((a, b) => b.priority - a.priority);
  const best = candidates[0];

  return `<p><strong>Top affordable item:</strong><br>${best.type}: ${best.name} — ${formatCompactNumber(best.cost)} credits</p>`;
}


function showLevelComplete() {
  state.nextReady = true;
  state.levelCompleteShown = true;
  state.paused = true;
  saveCheckpoint("level-complete");
  setNextButtonVisible(true);
  const atMax = state.difficultyLevel >= MAX_LEVEL;
  const next = atMax ? state.level + 1 : state.level + 1;
  const upcomingUnlocks = atMax ? [] : getUnlocksForLevel(Math.min(MAX_LEVEL, state.difficultyLevel + 1));
  const unlockText = upcomingUnlocks.length
    ? `<p><strong>Next level unlocks:</strong><br>${upcomingUnlocks.join("<br>")}</p>`
    : atMax
      ? `<p><strong>Difficulty reset incoming:</strong> Level returns to 1, but bombs are added. Do not tap bombs.</p>`
      : `<p>No new shop unlock next level, but rewards and difficulty increase.</p>`;

  const affordAnything = canBuyAnything();
  const premiumNotice = bestAffordableShopNotice();

  overlay.style.display = "grid";
  overlay.innerHTML = `
    <div class="card">
      <h1>Level ${state.level} Cleared!</h1>
      <p>You have <strong>${formatCompactNumber(state.coins)}</strong> credits.</p>
      ${unlockText}
      ${premiumNotice}
      ${affordAnything ? `<p>Visit the shop before continuing?</p>` : `<p><strong>Not enough credits to buy anything yet.</strong></p>`}
      <div class="button-row">
        <button onclick="openShop(true)">${affordAnything ? "Shop Upgrades" : "View Upgrades"}</button>
        <button onclick="advanceAfterLevel()">Continue</button>
      </div>
    </div>
  `;
}

window.advanceAfterLevel = function() {
  if (!state.running) return;
  if (resizeTimer) clearTimeout(resizeTimer);
  state.ignoreViewportPauseUntil = performance.now() + 1200;

  state.level++;
  if (state.difficultyLevel >= MAX_LEVEL) {
    state.difficultyLevel = 1;
    state.cycle++;
    showMessage(state.hardMode ? "Hard Mode reset! More bombs and targets." : "Difficulty reset! Bombs can appear now.");
  } else {
    state.difficultyLevel++;
  }

  saveCheckpoint("advance-level");

  if (state.level % 100 === 0) {
    showHundredLevelMilestone();
    return;
  }

  startLevel();
};
